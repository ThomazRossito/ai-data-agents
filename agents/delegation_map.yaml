# ════════════════════════════════════════════════════════════════════════════
# Delegation Map — fonte única do roteamento "Situação → Agente"
# ════════════════════════════════════════════════════════════════════════════
# Regra: adicionar agente = editar este YAML; a tabela markdown em
# kb/task_routing.md §2 é regenerada a partir daqui (agents/delegation.py).
#
# Campos:
#   situation  — rótulo humano exibido na tabela markdown
#   agent      — slug do agente (tem que existir em agents/registry/<slug>.md)
#   tier       — T0/T1/T2/T3 (informativo; fonte de verdade é o frontmatter do registry)
#   keywords   — (opcional) palavras-chave para classificação programática futura
# ════════════════════════════════════════════════════════════════════════════

routes:
  # Migração
  - situation: "Migração SQL Server/PostgreSQL → Databricks/Fabric"
    agent: migration-expert
    tier: T1
    keywords: [migração, migration, "sql-server", "sql server", postgres, postgresql]
  - situation: "/migrate ou assessment de banco relacional"
    agent: migration-expert
    tier: T1
    keywords: [migrate, assessment, cutover]
  - situation: "DDL de origem extraído → propor Medallion"
    agent: migration-expert
    tier: T1
    keywords: [ddl, medallion, assessment]

  # Intake de requisitos
  - situation: "Transcript / briefing / notas brutas"
    agent: business-analyst
    tier: T0
    keywords: [transcript, briefing, reunião, ata, notas]
  - situation: "Input não estruturado antes do /plan"
    agent: business-analyst
    tier: T0
    keywords: [brief, intake, requisitos]

  # Qualidade
  - situation: "Tabela nova ingerida → validar qualidade"
    agent: data-quality-steward
    tier: T2
    keywords: [qualidade, validação, expectations, profiling]
  - situation: "Alerta de qualidade disparado → investigar"
    agent: data-quality-steward
    tier: T2
    keywords: [alerta, SLA, violação]
  - situation: "Schema drift em streaming"
    agent: data-quality-steward
    tier: T2
    keywords: ["schema drift", "data drift", streaming]

  # Governança
  - situation: "Pipeline modificado → verificar conformidade"
    agent: governance-auditor
    tier: T2
    keywords: [conformidade, auditoria, compliance]
  - situation: "Acesso incomum detectado → auditar"
    agent: governance-auditor
    tier: T2
    keywords: [acesso, audit, permissões]
  - situation: "Dados PII expostos → classificar e proteger"
    agent: governance-auditor
    tier: T2
    keywords: [PII, LGPD, GDPR, sensível]

  # Microsoft Fabric (plataforma completa)
  - situation: "Qualquer tarefa exclusiva do Microsoft Fabric"
    agent: fabric-engineer
    tier: T1
    keywords: [fabric, lakehouse, onelake, "data factory fabric", "power bi", DAX, "direct lake", "semantic model fabric"]
  - situation: "Descoberta: listar workspaces / lakehouses / tabelas no Fabric"
    agent: fabric-engineer
    tier: T1
    keywords: [workspace, lakehouse, "list items", "o que existe", descoberta]
  - situation: "Design ou revisão de arquitetura Medallion no Fabric"
    agent: fabric-engineer
    tier: T1
    keywords: [bronze, silver, gold, medallion, lakehouse]
  - situation: "Semantic Model / DAX / Direct Lake (Fabric)"
    agent: fabric-engineer
    tier: T1
    keywords: ["semantic model", "power bi", DAX, "direct lake"]
  - situation: "Comentários de catálogo / Data Maturity Score (Fabric)"
    agent: fabric-engineer
    tier: T1
    keywords: [comentários, catálogo, "maturity score", "estate scan"]
  - situation: "Star Schema / Data Vault / SCD (Fabric)"
    agent: fabric-engineer
    tier: T1
    keywords: ["star schema", "data vault", scd, dimensional, hub, satellite]
  - situation: "Governança Fabric: Sensitivity Labels / Workspace Roles / linhagem"
    agent: fabric-engineer
    tier: T1
    keywords: ["sensitivity label", "workspace role", linhagem, lineage, purview]
  - situation: "FinOps Fabric: Capacity Units / rightsizing"
    agent: fabric-engineer
    tier: T1
    keywords: [cu, "capacity unit", "capacity units", finops, rightsizing]

  # Fabric Real-Time Intelligence
  - situation: "Fabric RTI: Eventhouse / KQL / Eventstream / Activator"
    agent: fabric-rti
    tier: T2
    keywords: [eventhouse, kql, kusto, eventstream, activator, rti, "real-time intelligence"]
  - situation: "KQL queries / séries temporais em tempo real (Fabric)"
    agent: fabric-rti
    tier: T2
    keywords: ["kql query", "time series", "bin()", "summarize", kusto]

  # Fabric Ontology (OWL / Fabric IQ)
  - situation: "OWL / RDF / ontologia / Fabric IQ Ontology"
    agent: fabric-ontology
    tier: T2
    keywords: [owl, rdf, ontologia, ontology, turtle, skos, sparql, rdflib, "fabric iq"]

  # Databricks — Engenharia de Dados (plataforma completa)
  - situation: "Qualquer tarefa SQL / Spark SQL / Unity Catalog (Databricks)"
    agent: databricks-engineer
    tier: T1
    keywords: [sql, "spark sql", "unity catalog", schema, catalog, table, databricks]
  - situation: "PySpark / DLT / LakeFlow / Delta Lake (Databricks)"
    agent: databricks-engineer
    tier: T1
    keywords: [pyspark, "spark sql", dlt, lakeflow, delta, "delta lake", "streaming table", "materialized view"]
  - situation: "Jobs e orquestração Databricks"
    agent: databricks-engineer
    tier: T1
    keywords: [jobs, job, orquestração, orchestration, cron, agendamento, databricks]
  - situation: "CDC com Debezium / Kafka Connect / AUTO CDC INTO (Databricks)"
