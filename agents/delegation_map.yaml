  - situation: "Criar Knowledge Assistant (KA) / Mosaic AI Supervisor (MAS)"
    agent: databricks-engineer
    tier: T1
    keywords: [KA, MAS, "knowledge assistant", mosaic]
  - situation: "Executar código serverless / criar cluster/warehouse (Databricks)"
    agent: databricks-engineer
    tier: T1
    keywords: [serverless, cluster, warehouse, execute_code]
  - situation: "Criar/atualizar Genie Space (Databricks)"
    agent: databricks-engineer
    tier: T1
    keywords: [genie, "conversational bi"]
  - situation: "Criar/publicar AI/BI Dashboard (Databricks)"
    agent: databricks-engineer
    tier: T1
    keywords: [dashboard, "ai/bi", aibi]
  - situation: "Custo de DBU elevado → investigar e otimizar (Databricks)"
    agent: databricks-engineer
    tier: T1
    keywords: [dbu, custo, cost, "rightsizing cluster", otimização, finops, databricks]
  - situation: "Pipeline DLT com falhas recorrentes (Databricks)"
    agent: databricks-engineer
    tier: T1
