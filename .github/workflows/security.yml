name: Security — Dependency Review

# Blocks PRs that introduce dependencies with known vulnerabilities
# or non-compliant licenses. Runs only on pull_request because it
# compares HEAD against the base commit.

on:
  pull_request:
    branches: ["main", "develop", "refactor/v3.0"]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Added Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail PR if new dependencies introduce HIGH+ vulnerabilities
          fail-on-severity: high
          # License allowlist — permissive licenses only by default
          allow-licenses: >-
            Apache-2.0,
            MIT,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            Python-2.0,
            PSF-2.0,
            CC0-1.0,
            Unlicense,
            0BSD
          # Optional: comment a summary on the PR
          comment-summary-in-pr: on-failure
