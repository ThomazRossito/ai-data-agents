name: CodeQL Analysis

# Static analysis for vulnerabilities in Python code.
# Runs on pushes to main, all PRs, and weekly on a schedule.
# Findings appear in the Security tab of the repository.

on:
  push:
    branches: ["main", "develop", "refactor/v3.0"]
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "**.py"
      - ".github/workflows/codeql.yml"
  schedule:
    # Mondays at 04:00 UTC — slow scan, weekly cadence
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v3.28.10
        with:
          languages: ${{ matrix.language }}
          # Use 'security-and-quality' for broader coverage; 'security-extended' for tighter focus
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v3.28.10

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v3.28.10
        with:
          category: "/language:${{ matrix.language }}"
