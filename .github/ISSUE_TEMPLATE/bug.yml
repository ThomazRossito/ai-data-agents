name: 🐛 Bug Report
description: Report a defect in ai-data-agents
title: "[Bug] "
labels: ["bug", "needs-triage"]
assignees:
  - ThomazRossito

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Before submitting:
        - Search [existing issues](https://github.com/ThomazRossito/ai-data-agents/issues?q=is%3Aissue) to avoid duplicates.
        - If this is a security vulnerability, **do not** report it here — see [SECURITY.md](https://github.com/ThomazRossito/ai-data-agents/blob/main/SECURITY.md).

  - type: input
    id: version
    attributes:
      label: ai-data-agents version
      description: Output of `pip show ai-data-agents | grep Version` or value from `pyproject.toml`.
      placeholder: "2.3.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "3.11.7"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (RHEL/Fedora)
        - Windows / WSL
        - Other (specify in environment)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      multiple: true
      options:
        - Supervisor / agent orchestration
        - Specific agent (specify in description)
        - MCP server — Databricks
        - MCP server — Fabric (community/official/sql/rti/semantic/onelake/notebook/ontology)
        - MCP server — Other (Genie, Migration Source, Azure Pricing)
        - Hooks (security/audit/cost-guard/compressor/memory)
        - Memory system (ShortTerm/LongTerm/Ledger)
        - CLI (main.py)
        - UI (Chainlit / monitoring / visualization)
        - Slash command
        - Knowledge Base / Skills
        - Build / packaging / install
        - CI / CD
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include the error message if any.
      placeholder: |
        When I run `/sql SELECT 1`, the supervisor reports "agent not found" instead of delegating to databricks-engineer.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: |
        Supervisor should delegate to databricks-engineer and return the query result.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction. Include commands, prompts, and `.env` values that are not secrets.
      placeholder: |
        1. `cp .env.example .env && fill ANTHROPIC_API_KEY`
        2. `python main.py`
        3. Type: `/sql SELECT 1`
        4. Observe error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Relevant lines from `logs/app.jsonl`, `logs/audit.jsonl`, or stderr.
        **Redact tokens and secrets** before pasting.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Anything else relevant — Conda env, virtualenv, container, Databricks/Fabric tier, MCP servers configured.
      render: text

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched for existing issues that report the same bug.
          required: true
        - label: I have removed all secrets, tokens, and personal data from the logs and reproduction steps.
          required: true
