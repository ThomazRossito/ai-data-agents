# ════════════════════════════════════════════════════════════════════════════
# Slash Commands — Data Agents
# ════════════════════════════════════════════════════════════════════════════
# Fonte única de verdade para o parser em commands/parser.py.
# Adicionar ou editar comandos aqui; o loader carrega automaticamente.
# ════════════════════════════════════════════════════════════════════════════

commands:
  brief:
    agent: business-analyst
    doma_mode: full
    description: |-
      Processa transcript de reunião ou briefing e gera backlog estruturado (P0/P1/P2). Use antes do /plan quando o input for um documento bruto de negócio.
    skills:
    - templates/backlog.md
    prompt_template: |-
      [DOMA INTAKE] Delegue IMEDIATAMENTE para business-analyst. NÃO crie PRD, NÃO peça aprovação neste momento. O agente deve: (1) Ler o template em `templates/backlog.md` para entender o formato de saída. (2) Processar o documento abaixo extraindo stakeholders, decisões, requisitos e restrições. (3) Mapear cada requisito ao domínio técnico correto (Databricks/Fabric/pipelines/SQL/etc). (4) Priorizar os itens em P0 (crítico, máx 3), P1 (importante) e P2 (desejável). (5) Garantir que o diretório `output/backlog/` existe (Bash: mkdir -p output/backlog). (6) Salvar o backlog preenchido em `output/backlog/backlog_<nome_descritivo>.md` via Write. (7) Apresentar resumo com contagem por prioridade e o próximo passo:     /plan output/backlog/backlog_<nome_descritivo>.md NOTA: O documento abaixo já está embutido inline (se o usuário passou um caminho, o conteúdo do arquivo foi lido e colado pelo parser). NÃO use Read() para tentar abrir o arquivo de novo — processe o conteúdo abaixo diretamente. Documento: {task}
    display_template: '[bold blue]📋 [DOMA Intake] Processando documento com: {agent}[/bold blue]'
  sql:
    agent: databricks-engineer
    doma_mode: express
    description: Envia tarefa SQL diretamente para o Databricks Engineer (DOMA Express).
    skills:
    - skills/patterns/sql-generation/SKILL.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para databricks-engineer. Não crie PRD, não peça aprovação. Instrua o agente a ler as skills relevantes do seu Mapa de Skills antes de gerar código. Tarefa: {task}
    display_template: '[bold yellow]🚀 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  spark:
    agent: databricks-engineer
    doma_mode: express
    description: Envia tarefa PySpark diretamente para o Databricks Engineer (DOMA Express).
    skills:
    - skills/databricks/databricks-spark-declarative-pipelines/SKILL.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para databricks-engineer. Não crie PRD, não peça aprovação. Instrua o agente a ler as skills relevantes do seu Mapa de Skills antes de gerar código. Tarefa: {task}
    display_template: '[bold yellow]🚀 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  pipeline:
    agent: databricks-engineer
    doma_mode: express
    description: Envia tarefa de pipeline Databricks para o Databricks Engineer (DOMA Express).
    skills:
    - skills/patterns/pipeline-design/SKILL.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para databricks-engineer. Não crie PRD, não peça aprovação. Instrua o agente a ler as skills relevantes do seu Mapa de Skills antes de gerar código. Tarefa: {task}
    display_template: '[bold yellow]🚀 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  fabric:
    agent: fabric-engineer
    doma_mode: express
    description: |-
      Envia qualquer tarefa do Microsoft Fabric para o Fabric Engineer (DOMA Express). Cobre: discovery de workspace/lakehouses/tabelas, Medallion Architecture, Data Factory, Star Schema/Data Vault, Semantic Models e DAX, catálogo, governança, qualidade e FinOps no Fabric.
    skills:
    - skills/fabric/fabric-medallion/SKILL.md
    - skills/fabric/fabric-direct-lake/SKILL.md
    - skills/fabric/fabric-data-factory/SKILL.md
    - skills/fabric/fabric-notebook-manager/SKILL.md
    prompt_template: "[DOMA EXPRESS — FABRIC] Delegue IMEDIATAMENTE para fabric-engineer. NÃO crie PRD, NÃO peça aprovação.\n\
      \n⛔ RESTRIÇÃO ABSOLUTA DE PLATAFORMA:\nEste comando é exclusivo para Microsoft Fabric. NUNCA use ferramentas Databricks\
      \ (mcp__databricks__*). Se as ferramentas Fabric não retornarem dados, reporte o erro claramente.\n\nPARA DESCOBERTA\
      \ DE TABELAS (schemas bronze/silver/gold): Use PRIMEIRO mcp__fabric_sql__fabric_sql_list_tables() — acessa todos os\
      \ schemas. Se indisponível, use mcp__fabric_community__list_tables().\n\n⚠️ PARA CRIAR/EDITAR NOTEBOOKS: USE PRIMEIRO\
      \ o MCP customizado fabric_notebook — mcp__fabric_notebook__fabric_notebook_create(display_name, cells) faz tudo numa\
      \ chamada atômica (montagem do .ipynb + base64 + LRO polling internamente). NÃO use mcp__fabric_official__core_create-item\
      \ pra Notebook — esse caminho ficou marcado como anti-pattern depois de criar 13 notebooks lixo na POC BTG. As outras\
      \ tools do fabric_notebook (list/get_cells/replace/add_cell/update_cell/delete_cell/delete/cleanup_test_items/run) cobrem\
      \ o ciclo de vida completo, incluindo execução on-demand de notebook e pipeline via REST. Formato esperado de cells:\
      \ lista de objetos contendo as chaves `source` (código fonte como string) e `cell_type` (valor `code` ou `markdown`).\
      \ Em caso de falha, NUNCA crie outro item com sufixo (_v2, _with_def) — use fabric_notebook_replace no MESMO\
      \ item_id.\n\n⚠️ PARA UPLOAD/DOWNLOAD DE ARQUIVOS NO ONELAKE: USE PRIMEIRO o MCP customizado fabric_onelake — mcp__fabric_onelake__fabric_onelake_upload_local_file(lakehouse,\
      \ local_path) faz upload atômico via DFS API (create+append+flush). NÃO use mcp__fabric_official__onelake_upload_file — tem bug conhecido\
      \ que retorna HTTP 400 mesmo com Service Principal Admin (validado em 2026-05-14). As outras tools fabric_onelake_* cobrem download,\
      \ list_files, file_exists, create_directory e delete_file.\n\nTarefa: {task}"
    display_template: '[bold yellow]🚀 [DOMA Express] Direcionando para: {agent} (Fabric)[/bold yellow]'
  plan:
    agent: null
    doma_mode: full
    description: Inicia o fluxo DOMA completo com PRD e aprovação.
    skills: []
    prompt_template: |-
      Como Product Manager/Arquiteto (DOMA Passo 1), você deve criar um PRD completo para a tarefa abaixo. ANTES de escrever qualquer linha do PRD, use a ferramenta Read para ler os skills relevantes: (1) Identifique o tipo de tarefa (SDP, Structured Streaming, Jobs, Fabric Lakehouse, RTI, etc). (2) Consulte o Mapa de Skills no seu system prompt para decidir quais SKILL.md ler. (3) Leia TODOS os skills identificados antes de começar o PRD. (4) Garanta que o diretório `output/prd/` existe (Bash: mkdir -p output/prd). (5) Crie um PRD detalhado em `output/prd/prd_<nome_descritivo>.md` usando Bash, incluindo: arquitetura Medallion moderna (Bronze→Silver→Gold), padrões obrigatórios por camada, agentes a acionar e ordem de execução. Se a tarefa envolver Star Schema ou Gold Layer com dim_*/fact_*, inclua no PRD as regras de `skills/patterns/star-schema-design/SKILL.md`: autonomia das dimensões, geração sintética de dim_data via SEQUENCE, e INNER JOIN obrigatório nas fact_*. (6) Apresente o resumo do PRD e aguarde aprovação antes de delegar. Após aprovação: garanta que `output/specs/` existe (mkdir -p output/specs) e salve a SPEC em `output/specs/spec_<nome_descritivo>.md`. Tarefa: {task}
    display_template: |-
      [bold purple]🗺️ [DOMA Agile] Iniciando Context Engineering — lendo skills relevantes...[/bold purple]
  eval:
    agent: null
    doma_mode: internal
    description: |-
      Exibe resumo das avaliações de qualidade por sessão. Avaliações são coletadas ao encerrar cada sessão interativa.
    skills: []
    prompt_template: '{task}'
    display_template: '[bold cyan]⭐ [Eval] Resumo de avaliações de qualidade...[/bold cyan]'
  mcp:
    agent: null
    doma_mode: internal
    description: |-
      Exibe status em tempo real de todos os MCP servers (ativos/inativos). Opcional: /mcp <nome> filtra por servidor específico. Ex: /mcp tavily
    skills: []
    prompt_template: '{task}'
    display_template: '[bold cyan]🔌 [MCP Status] Verificando MCP servers...[/bold cyan]'
  health:
    agent: null
    doma_mode: internal
    description: Verifica a conectividade com as plataformas configuradas. Executado localmente sem LLM.
    skills: []
    prompt_template: '{task}'
    display_template: '[bold cyan]🏥 [Health Check] Verificando conectividade das plataformas...[/bold cyan]'
  status:
    agent: null
    doma_mode: internal
    description: Lista PRDs gerados e status da sessão atual.
    skills: []
    prompt_template: |-
      Liste os artefatos gerados nas seguintes pastas usando Glob e Read: (1) PRDs em `output/prd/` — mostre nome, data e primeiras 5 linhas de cada um. (2) SPECs em `output/specs/` — mostre nome e primeiras 3 linhas. (3) Backlogs em `output/backlog/` — mostre nome e prioridades (P0/P1/P2). Se alguma pasta não existir ou estiver vazia, informe que nenhum artefato foi gerado ainda.
    display_template: '[bold cyan]📋 [Status] Consultando PRDs e estado da sessão...[/bold cyan]'
  review:
    agent: null
    doma_mode: internal
    description: Revisita um PRD existente sem recriar do zero.
    skills: []
    prompt_template: |-
      Leia o PRD mais recente da pasta `output/prd/` (ou o PRD especificado: {task}). Se existir uma SPEC correspondente em `output/specs/`, leia-a também. Apresente um resumo do PRD e pergunte ao usuário se deseja: (1) Continuar a implementação a partir deste PRD, (2) Modificar algum aspecto da arquitetura, ou (3) Descartar e criar um novo PRD.
    display_template: '[bold purple]🔄 [Review] Revisitando PRD existente...[/bold purple]'
  dbt:
    agent: dbt-expert
    doma_mode: express
    description: |-
      Envia tarefa dbt diretamente para o dbt Expert (DOMA Express). Use para models, testes, snapshots, seeds, documentação e boas práticas de projeto dbt.
    skills:
    - kb/sql-patterns/index.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para dbt-expert. Não crie PRD, não peça aprovação. Instrua o agente a ler `kb/sql-patterns/index.md` antes de executar e a buscar documentação atualizada via context7 se necessário. Tarefa: {task}
    display_template: '[bold yellow]🛠️ [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  quality:
    agent: data-quality-steward
    doma_mode: express
    description: Envia tarefa de qualidade de dados para o Data Quality Steward (DOMA Express).
    skills:
    - kb/data-quality/index.md
    - skills/patterns/data-quality/SKILL.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para data-quality-steward. Não crie PRD, não peça aprovação. Instrua o agente a ler `kb/data-quality/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]🔍 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  governance:
    agent: governance-auditor
    doma_mode: express
    description: Envia tarefa de governança para o Governance Auditor (DOMA Express).
    skills:
    - kb/governance/index.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para governance-auditor. Não crie PRD, não peça aprovação. Instrua o agente a ler `kb/governance/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]🔐 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  semantic:
    agent: fabric-engineer
    doma_mode: express
    description: |-
      Envia tarefa de modelagem semântica Fabric para o Fabric Engineer (DOMA Express). Cobre: Semantic Models, DAX, Direct Lake, Metric Views, Power BI.
    skills:
    - kb/semantic-modeling/index.md
    - skills/fabric/fabric-direct-lake/SKILL.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para fabric-engineer. Não crie PRD, não peça aprovação. Foco no domínio de Modelagem Semântica: Semantic Models, DAX, Direct Lake, Metric Views. Instrua o agente a ler `kb/semantic-modeling/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]📊 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  python:
    agent: python-expert
    doma_mode: express
    description: |-
      Envia tarefa Python diretamente para o Python Expert (DOMA Express). Use para: pacotes, automação, APIs REST, CLIs, testes pytest, pandas/polars, FastAPI.
    skills:
    - kb/python/index.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para python-expert. Não crie PRD, não peça aprovação. Instrua o agente a buscar documentação atualizada via context7 se necessário e a seguir PEP 8, type hints e mínimo de dependências externas. Tarefa: {task}
    display_template: '[bold yellow]🐍 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  migrate:
    agent: migration-expert
    doma_mode: full
    description: |-
      Inicia assessment e migração de SQL Server ou PostgreSQL para Databricks/Fabric. Gera PRD de migração com mapeamento de tipos, Medallion e estratégia de cutover. Exemplos: /migrate sql-server para databricks | /migrate postgres para fabric
    skills:
    - kb/migration/index.md
    prompt_template: |-
      [DOMA MIGRATE] Delegue IMEDIATAMENTE para migration-expert. Não gere SQL diretamente. O agente deve: (1) Ler `kb/migration/index.md` para regras de mapeamento de tipos e anti-padrões. (2) Conectar ao banco de origem via migration_source MCP para extrair DDL e estatísticas. (3) Gerar assessment de complexidade (LOW/MEDIUM/HIGH) por objeto. (4) Propor arquitetura Medallion Bronze→Silver→Gold no destino. (5) Salvar o plano de migração em `output/migration/migration_plan_<nome>.md`. (6) Apresentar resumo e aguardar aprovação antes de gerar scripts. Tarefa: {task}
    display_template: '[bold yellow]🚚 [DOMA Migrate] Iniciando assessment com: {agent}[/bold yellow]'
  genie:
    agent: databricks-engineer
    doma_mode: express
    description: Cria ou atualiza Genie Spaces no Databricks para Conversational BI (DOMA Express).
    skills:
    - kb/semantic-modeling/index.md
    prompt_template: |-
      [DOMA EXPRESS — GENIE] Delegue IMEDIATAMENTE para databricks-engineer. Não crie PRD, não peça aprovação. O agente deve usar as ferramentas Databricks Genie (mcp__databricks_genie__* e mcp__databricks__create_or_update_genie) para criar ou atualizar o Genie Space conforme solicitado. Instrua o agente a ler `kb/semantic-modeling/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]🧞 [DOMA Express] Criando Genie Space com: {agent}[/bold yellow]'
  dashboard:
    agent: databricks-engineer
    doma_mode: express
    description: Cria ou publica AI/BI Dashboards no Databricks (DOMA Express).
    skills:
    - kb/semantic-modeling/index.md
    prompt_template: |-
      [DOMA EXPRESS — DASHBOARD] Delegue IMEDIATAMENTE para databricks-engineer. Não crie PRD, não peça aprovação. O agente deve usar as ferramentas Databricks AI/BI Dashboard (mcp__databricks__create_or_update_dashboard) para criar ou publicar o dashboard conforme solicitado. Instrua o agente a ler `kb/semantic-modeling/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]📈 [DOMA Express] Criando Dashboard com: {agent}[/bold yellow]'
  analyze-project:
    agent: null
    doma_mode: internal
    description: |-
      Análise completa do projeto de dados a partir de 4 perspectivas especializadas em paralelo: engenharia (Databricks + Fabric), qualidade e governança. Salva relatório consolidado em output/analyze-project/. Flags: --quality | --arch | --databricks | --fabric.
    skills: []
    prompt_template: '{task}'
    display_template: '[bold green]🔬 [Analyze] Iniciando análise completa do projeto...[/bold green]'
  party:
    agent: null
    doma_mode: internal
    description: |-
      Convoca múltiplos agentes especialistas em paralelo para perspectivas independentes. Grupos: padrão (databricks+fabric) | --quality | --arch | --engineering | --migration | --full. Ou especifique agentes: /party databricks-engineer fabric-engineer <query>.
    skills: []
    prompt_template: '{task}'
    display_template: '[bold magenta]🎉 [DOMA Party Mode] Convocando agentes em paralelo...[/bold magenta]'
  memory:
    agent: null
    doma_mode: internal
    description: |-
      Gerencia o sistema de memória persistente. Subcomandos: status, flush, compile, lint, search <query>.
    skills: []
    prompt_template: '[MEMORY COMMAND] {task}'
    display_template: '[bold cyan]🧠 [Memory] Gerenciando memória persistente...[/bold cyan]'
  sessions:
    agent: null
    doma_mode: internal
    description: |-
      Lista sessões registradas (transcript + checkpoint). Sem argumentos exibe as 20 mais recentes. Subcomandos: /sessions all (todas) | /sessions <session_id> (detalhes).
    skills: []
    prompt_template: '[SESSIONS COMMAND] {task}'
    display_template: '[bold cyan]📚 [Sessions] Listando sessões registradas...[/bold cyan]'
  resume:
    agent: null
    doma_mode: internal
    description: |-
      Retoma uma sessão anterior reconstruindo o contexto a partir do transcript. Uso: /resume last (mais recente) ou /resume <session_id>. Respeita o budget de contexto (~15k tokens por padrão).
    skills: []
    prompt_template: '[RESUME COMMAND] {task}'
    display_template: '[bold cyan]🔄 [Resume] Retomando sessão anterior...[/bold cyan]'
  geral:
    agent: geral
    doma_mode: express
    description: |-
      Pergunta conversacional respondida pelo Kimi K2.6 (Moonshot). Ideal para dúvidas técnicas, conceitos, explicações e perguntas gerais de dados. Rápido e econômico.
    skills: []
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para geral. NÃO leia arquivos, NÃO use ferramentas, NÃO consulte KBs. O agente responde do próprio conhecimento. Não crie PRD, não peça aprovação. Pergunta: {task}
    display_template: '[bold cyan]💬 [Geral] Respondendo com Kimi K2.6...[/bold cyan]'
  ontology:
    agent: fabric-ontology
    doma_mode: express
    description: |-
      Envia tarefa de ontologia OWL para o Fabric Ontology (DOMA Express). Use para: design de ontologias OWL 2, import/export de arquivos OWL/RDF/Turtle no Fabric OneLake, conversão entre formatos de serialização, validação de estrutura ontológica e integração de triples com Delta Lake.
    skills:
    - kb/semantic-web/index.md
    - skills/ontology/fabric-ontology-owl/SKILL.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para fabric-ontology. Não crie PRD, não peça aprovação.

      O agente deve:
      1. Ler `kb/semantic-web/index.md` para entender o escopo atual (OWL) e o roadmap.
      2. Ler `skills/ontology/fabric-ontology-owl/SKILL.md` para o playbook operacional.
      3. Identificar o tipo de tarefa: design | import | export | conversão | validação.
      4. Seguir o protocolo correspondente da SKILL.md.
      5. Para tarefas que envolvam Fabric OneLake: usar mcp__fabric_official__onelake_* para upload/download de arquivos OWL.
      6. Para execução de scripts rdflib em escala: gerar o notebook Spark completo e escalar para databricks-engineer se necessário.
      7. Nunca armazenar PII como literal na A-Box sem aprovação do governance-auditor.

      Tarefa: {task}
    display_template: '[bold green]🧬 [DOMA Express] Direcionando para: {agent}[/bold green]'
  catalog:
    agent: fabric-engineer
    doma_mode: express
    description: |-
      Aciona o Fabric Engineer para documentar, avaliar e descobrir valor no catálogo de dados Fabric. Subcomandos: comments <schema> | scan [schema] | discover [schema] | industry <schema>. Exemplos: /catalog comments gold | /catalog scan silver | /catalog discover | /catalog industry gold
    skills:
    - kb/industry/index.md
    - kb/governance/index.md
    prompt_template: |-
      [DOMA EXPRESS — CATALOG] Delegue IMEDIATAMENTE para fabric-engineer. Não crie PRD, não peça aprovação.

      O agente deve:
      1. Identificar o subcomando na tarefa (comments | scan | discover | industry).
      2. Ler `kb/industry/index.md` para contexto de indústria antes de inferir casos de uso.
      3. Ler `kb/governance/index.md` para regras de PII antes de gerar comentários.
      4. Executar o protocolo correspondente ao subcomando:
         - `comments <schema>`: fabric_sql_list_tables + fabric_sql_describe_table → gerar COMMENT SQL
         - `scan [schema]`: calcular Data Maturity Score (0-100) em 5 dimensões com nota A-F
         - `discover [schema]`: identificar casos de uso de negócio e valor estimado por tabela
         - `industry <schema>`: mapear tabelas a casos de uso e KPIs da indústria do cliente
      5. NUNCA executar DDL que não seja COMMENT ON. NUNCA modificar dados.
      6. Alertar sobre PII detectada ANTES de gerar comentários.

      Tarefa: {task}
    display_template: '[bold cyan]🗂️ [Catalog] Analisando catálogo com fabric-engineer...[/bold cyan]'
  ship:
    agent: business-analyst
    doma_mode: express
    description: |-
      Arquiva uma tarefa concluída com lições aprendidas, decisões técnicas e recomendações para futuras tarefas similares. Use ao final de qualquer tarefa complexa. Exemplo: /ship pipeline-vendas-bronze-gold
    skills:
    - templates/sdd/SHIPPED_template.md
    prompt_template: |-
      [DOMA EXPRESS — SHIP] Delegue IMEDIATAMENTE para business-analyst. Não crie PRD, não peça aprovação.

      O agente deve criar um documento SHIPPED para a tarefa concluída. Siga estas etapas:
      1. Leia o template em `templates/sdd/SHIPPED_template.md` com Read().
      2. Reflita sobre a sessão atual: o que foi entregue, quais agentes foram usados, quais decisões técnicas foram tomadas.
      3. Preencha todos os campos do template com base no contexto real da sessão.
      4. Garanta que o diretório `output/shipped/` existe (Bash: mkdir -p output/shipped).
      5. Salve o documento em `output/shipped/SHIPPED_{{task_slug}}_{{date}}.md` onde task_slug é o título em snake_case e date é a data atual (YYYY-MM-DD).
      6. Confirme ao usuário o caminho do arquivo salvo e as principais lições aprendidas (máx 3 bullets).

      Título da tarefa: {task}
    display_template: '[bold cyan]📦 [SHIP] Arquivando lições aprendidas: {task}[/bold cyan]'
  workflow:
    agent: null
    doma_mode: full
    description: |-
      Executa um workflow colaborativo pré-definido (WF-01 a WF-05) com encadeamento de contexto entre agentes e suporte a etapas paralelas. Exemplos: /workflow WF-01 pipeline bronze-gold vendas | /workflow WF-05 migrar SQL Server
    skills:
    - kb/collaboration-workflows.md
    prompt_template: |-
      [DOMA WORKFLOW] Execute o workflow pré-definido identificado na tarefa abaixo. Consulte `kb/collaboration-workflows.md` para os detalhes do workflow solicitado. Siga a sequência de agentes definida, passando o contexto de cada etapa para a próxima. Compile o contexto do workflow em `output/workflow-context/<wf-id>-context.md` antes de invocar o primeiro agente. Se o workflow exigir aprovação humana em alguma etapa, pause e aguarde confirmação. Tarefa: {task}
