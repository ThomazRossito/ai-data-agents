    per_m_tokens_usd: 1.50
    note: "Filter input/output para prevenir PII e unsafe data"
  inference_tables:
    cost_unit: gb
    per_gb_usd: 0.50
    increment: "1KB"
    note: "Track input/output dos modelos para audit"
  usage_tracking:
    cost_unit: gb
    per_gb_usd: 0.100
    increment: "1KB"
    note: "Monitor quem chama as APIs e usage associado"
  source_url: "https://www.databricks.com/product/pricing/ai-gateway"

# =============================================================================
# Agent Bricks (PR 3, 2026-05-28)
# =============================================================================
# Knowledge Assistant ($/Answer) + Supervisor Agent ($/DBU). Promo 50% off até 2026-06-30.
