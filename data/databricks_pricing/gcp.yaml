  h100_on_demand_per_dbu_usd: 7.00
  source_url: "https://www.databricks.com/product/pricing/ai-runtime"

# =============================================================================
# Default Storage — Databricks-managed storage (PR 4, 2026-05-28)
# =============================================================================
# DSU = Databricks Storage Unit. 1 GB-month armazenado = 1 DSU = $0.023.
# Tier 1 ops (writes/PUT/COPY) e Tier 2 ops (reads/GET) variam por cloud.
# Fonte: https://www.databricks.com/product/pricing/storage
default_storage:
  cost_unit: dsu
  per_dsu_usd: 0.023
  source_url: "https://www.databricks.com/product/pricing/storage"

  # DSU conversion per operation (per 1000 operations) — varia por cloud
  operations_per_1000:
    azure:
      stored_data_per_gb_month_dsu: 1.0
      tier1_writes_dsu: 0.3535          # equivalent to Write operations
      tier2_reads_dsu: 0.0226           # equivalent to Read operations
    aws:
      stored_data_per_gb_month_dsu: 1.0
      tier1_writes_dsu: 0.2174          # PUT, COPY, POST, LIST
      tier2_reads_dsu: 0.0174           # GET, SELECT, others
    gcp:
      stored_data_per_gb_month_dsu: 1.0
      tier1_writes_dsu: 0.2174          # Class A operations
      tier2_reads_dsu: 0.0174           # Class B operations

# =============================================================================
# Data Transfer & Connectivity (PR 4, 2026-05-28)
# =============================================================================
# 4 tipos: Private Connectivity (per GB + per hour endpoint), Public Connectivity,
# Data Egress. Preços específicos vêm de docs por cloud — bloco aqui documenta
# estrutura. Azure Private Link inbound/outbound charges são waived indefinitely.
# Fonte: https://www.databricks.com/product/pricing/data-transfer-connectivity
data_transfer:
  source_url: "https://www.databricks.com/product/pricing/data-transfer-connectivity"
  connection_types:
    private_connectivity_per_gb:
      cost_unit: gb
      note: "Per GB data processed via Databricks private connectivity"
      billed: true
    private_connectivity_per_hour:
      cost_unit: hour
      note: "Per hour endpoint fees. Azure: WAIVED indefinitely. AWS/GCP: active"
      billed_azure: false               # waived indefinitely
      billed_aws: true
      billed_gcp: true
    public_connectivity_per_gb:
      cost_unit: gb
      note: "Per GB data via Databricks public connectivity (public IPs)"
      billed: true
    data_egress_per_gb:
      cost_unit: gb
      note: "In-region inter-AZ + cross-region + internet + cross-cloud egress"
      billed: true

