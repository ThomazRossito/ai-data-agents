# =============================================================================
# Databricks Pricing Catalog — GCP (Google Cloud Platform)
# =============================================================================
# Fonte primária: https://www.databricks.com/product/sku-groups (SSG, HTML completo)
# Fonte secundária (DBU rates): /product/pricing/* (validados via Chrome MCP em 2026-05-28)
# Instance prices (GCE): consultados em RUNTIME via Google Cloud Billing API
#   (https://cloud.google.com/billing/v1/services/<service-id>/skus) — TODO.
#
# Atualização: trimestral via scripts/refresh_databricks_pricing.py (TODO)
#
# ATENÇÃO: todos os DBU rates são reference pricing PAYG (retail). Não cobrem
# descontos negociados Enterprise, CUDs (Committed Use Discounts) GCP, ou
# contratos custom. GCP prices derivados via paridade estrutural com AWS (per
# /product/sku-groups), salvo confirmação específica via página individual.
# =============================================================================

schema_version: "1.0.0"
cloud: gcp
last_updated: "2026-05-28"
last_verified_against_source: "2026-05-28"
source_url: "https://www.databricks.com/product/sku-groups"
audit_doc: "kb/databricks-pricing/extracted-prices-raw.md"
notes: |
  GCP scaffold criado em PR 2 (2026-05-28). Cobertura inicial:
    - DBU rates Premium e Enterprise (derivados via paridade AWS)
    - Sub-types serverless (jobs/dlt/all_purpose) com rates oficiais
    - SKUs Service-specific conforme /product/sku-groups
  Status: BETA — preços precisam de confirmação via Chrome MCP nas páginas
  individuais quando user confirmar prioridade GCP. PR 3 vai consolidar.

  Footnotes oficiais (per /product/sku-groups):
    * SKU marcada * = "iceberg only"
    ** SKU marcada ** = "GCP Marketplace metered"

  Instance prices: por enquanto consumidor (App) deve fornecer via parâmetro;
  integração com Google Cloud Billing API é trabalho futuro.

# =============================================================================
# Regions suportadas (subset comum)
# =============================================================================
regions:
  - id: us-central1
    display_name: "US Central (Iowa)"
    gcp_region_code: us-central1
    primary: true

  - id: us-east1
    display_name: "US East (South Carolina)"
    gcp_region_code: us-east1

  - id: us-east4
    display_name: "US East (Northern Virginia)"
    gcp_region_code: us-east4

  - id: us-west1
    display_name: "US West (Oregon)"
    gcp_region_code: us-west1

  - id: europe-west1
    display_name: "Europe West (Belgium)"
    gcp_region_code: europe-west1

  - id: europe-west4
    display_name: "Europe West (Netherlands)"
    gcp_region_code: europe-west4

  - id: southamerica-east1
    display_name: "South America East (São Paulo)"
    gcp_region_code: southamerica-east1

# =============================================================================
# DBU Rates (USD por DBU·hora)
# =============================================================================
# GCP estrutura idêntica a AWS (per /product/sku-groups), com Premium e
# Enterprise. Standard NÃO existe oficialmente.
# =============================================================================
dbu_rates_per_hour:

  # All-Purpose Compute (Premium/Enterprise — Standard DEPRECATED)
  all_purpose_compute:
    standard:
      # DEPRECATED: tier 'standard' não consta em /product/pricing/datascience-ml
      no_photon: 0.40
      photon: 0.55
      _deprecated: true
    premium:
      no_photon: 0.55
      photon: 0.65
    enterprise:
      no_photon: 0.65
      photon: 0.85

  # Jobs Compute
  jobs_compute:
    standard:
      # DEPRECATED
      no_photon: 0.10
      photon: 0.15
      _deprecated: true
    premium:
      no_photon: 0.15
      photon: 0.22
    enterprise:
      no_photon: 0.20
      photon: 0.30

  # Serverless Compute — backward-compat alias (DEPRECATED em PR 3)
  serverless_compute:
    base_per_dbu: 0.35
    _deprecated: true
    _deprecated_note: "Use jobs_serverless / dlt_serverless / sql_serverless / all_purpose_serverless"

  # Jobs Serverless Compute
  jobs_serverless:
    base_per_dbu: 0.35
    photon_auto_enabled: true
    modes: ["standard", "performance_optimized"]

  # DLT Serverless Compute
  dlt_serverless:
    base_per_dbu: 0.35
    photon_auto_enabled: true
    modes: ["standard", "performance_optimized"]

  # All-Purpose Serverless Compute
  all_purpose_serverless:
    base_per_dbu: 0.75
    photon_auto_enabled: true
    photon_factor_classic: 2.0

  # Delta Live Tables (Classic)
  delta_live_tables:
    core: 0.20
    pro: 0.25
    advanced: 0.36

  # SQL Warehouse
  sql:
    classic: 0.22
    pro: 0.55
    serverless: 0.70

  # Model Serving
  model_serving:
    cpu_per_dbu: 0.07
    gpu_t4_per_dbu: 0.07
    gpu_a10_per_dbu: 0.07

  # Vector Search (legacy structure — PR 3 vai expandir pra tiers Standard/Storage-Opt)
  vector_search:
    storage_endpoint_per_hour: 0.45
    storage_per_million_vectors_month: 0.18
    query_per_million_queries: 1.00

  # Mosaic AI Agent Framework (legacy — PR 3 vai expandir pra Knowledge Assistant/Supervisor)
  mosaic_agent:
    serverless_per_dbu: 0.95

# =============================================================================
# DBU Multiplier por Instance Type (GCE)
# =============================================================================
# Mapeia GCE machine types → DBU/hora. Lista representativa; expandir conforme
# uso real. Valores derivados via paridade vCPU/RAM com AWS m5/r5 series.
# =============================================================================
instance_dbu_map:

  # General Purpose (N2)
  n2-standard-2: { dbu_per_hour: 0.50, vcpu: 2, ram_gb: 8 }
  n2-standard-4: { dbu_per_hour: 1.00, vcpu: 4, ram_gb: 16 }
  n2-standard-8: { dbu_per_hour: 2.00, vcpu: 8, ram_gb: 32 }
  n2-standard-16: { dbu_per_hour: 4.00, vcpu: 16, ram_gb: 64 }
  n2-standard-32: { dbu_per_hour: 8.00, vcpu: 32, ram_gb: 128 }
  n2-standard-48: { dbu_per_hour: 12.00, vcpu: 48, ram_gb: 192 }
  n2-standard-64: { dbu_per_hour: 16.00, vcpu: 64, ram_gb: 256 }
  n2-standard-96: { dbu_per_hour: 24.00, vcpu: 96, ram_gb: 384 }

  # Memory Optimized (N2 high-memory)
  n2-highmem-4: { dbu_per_hour: 1.50, vcpu: 4, ram_gb: 32 }
  n2-highmem-8: { dbu_per_hour: 3.00, vcpu: 8, ram_gb: 64 }
  n2-highmem-16: { dbu_per_hour: 6.00, vcpu: 16, ram_gb: 128 }
  n2-highmem-32: { dbu_per_hour: 12.00, vcpu: 32, ram_gb: 256 }
  n2-highmem-64: { dbu_per_hour: 24.00, vcpu: 64, ram_gb: 512 }

  # Compute Optimized (C2)
  c2-standard-4: { dbu_per_hour: 0.75, vcpu: 4, ram_gb: 16 }
  c2-standard-8: { dbu_per_hour: 1.50, vcpu: 8, ram_gb: 32 }
  c2-standard-16: { dbu_per_hour: 3.00, vcpu: 16, ram_gb: 64 }
  c2-standard-30: { dbu_per_hour: 5.50, vcpu: 30, ram_gb: 120 }

  # GPU (A100 / T4)
  a2-highgpu-1g: { dbu_per_hour: 8.80, vcpu: 12, ram_gb: 85, gpu: 1, gpu_type: "A100" }
  a2-highgpu-2g: { dbu_per_hour: 17.60, vcpu: 24, ram_gb: 170, gpu: 2, gpu_type: "A100" }
  a2-highgpu-4g: { dbu_per_hour: 35.20, vcpu: 48, ram_gb: 340, gpu: 4, gpu_type: "A100" }
  a2-highgpu-8g: { dbu_per_hour: 70.40, vcpu: 96, ram_gb: 680, gpu: 8, gpu_type: "A100" }
  n1-standard-4-t4: { dbu_per_hour: 1.50, vcpu: 4, ram_gb: 15, gpu: 1, gpu_type: "T4" }

# =============================================================================
# DBCU Commit Discounts (Databricks Commit Unit)
# =============================================================================
# GCP tem mesma estrutura tiered de AWS/Azure. Valores ilustrativos —
# desconto real é negociado.
# =============================================================================
dbcu_commit_discounts:
  - tier_min_usd_year: 0
    tier_max_usd_year: 10000
    discount_pct_1y: 0
    discount_pct_3y: 0
    note: "Sem desconto — pay-as-you-go"

  - tier_min_usd_year: 10000
    tier_max_usd_year: 100000
    discount_pct_1y: 15
    discount_pct_3y: 22

  - tier_min_usd_year: 100000
    tier_max_usd_year: 500000
    discount_pct_1y: 22
    discount_pct_3y: 30

  - tier_min_usd_year: 500000
    tier_max_usd_year: 1500000
    discount_pct_1y: 28
    discount_pct_3y: 35

  - tier_min_usd_year: 1500000
    tier_max_usd_year: null
    discount_pct_1y: 32
    discount_pct_3y: 40

# =============================================================================
# Spot / Preemptible VM Discount Estimates
# =============================================================================
# GCP Spot VMs (antigo "Preemptible"): desconto até 91%, podem ser interrompidas
# com 30s de aviso. Valores são MÉDIAS — variabilidade real depende de demanda.
# =============================================================================
spot_discounts:
  us-central1:
    avg_discount_pct: 80
    interrupt_rate_hourly: "2-5%"

  us-east1:
    avg_discount_pct: 78
    interrupt_rate_hourly: "3-6%"

  us-west1:
    avg_discount_pct: 75
    interrupt_rate_hourly: "3-6%"

  europe-west1:
    avg_discount_pct: 72
    interrupt_rate_hourly: "4-8%"

  europe-west4:
    avg_discount_pct: 72
    interrupt_rate_hourly: "4-8%"

  southamerica-east1:
    avg_discount_pct: 60
    interrupt_rate_hourly: "5-10%"
    suitable_for: "Jobs batch sem SLA crítico"

# =============================================================================
# Storage — Google Cloud Storage + Persistent Disk
# =============================================================================
storage:
  gcs:
    standard_per_gb_month_usd: 0.020         # Standard storage
    nearline_per_gb_month_usd: 0.010
    coldline_per_gb_month_usd: 0.004
    archive_per_gb_month_usd: 0.0012

  persistent_disk:
    standard_per_gb_month_usd: 0.040
    ssd_per_gb_month_usd: 0.170
    balanced_per_gb_month_usd: 0.100

  operations:
    class_a_per_10k: 0.05                    # Writes, listing
    class_b_per_10k: 0.004                   # Reads

  delta_lake_overhead_pct: 10

# =============================================================================
# Networking
# =============================================================================
networking:
  vpc_peering_per_gb: 0.01
  private_service_connect_per_hour: 0.012

  egress:
    # Internet egress (most expensive)
    internet_per_gb_first_1tb: 0.12
    internet_per_gb_1to10tb: 0.11
    internet_per_gb_above_10tb: 0.08
    # Cross-region (same continent)
    cross_region_same_continent_per_gb: 0.08
    # Cross-region (different continent)
    cross_region_cross_continent_per_gb: 0.12

# =============================================================================
# Reserved Instances / Committed Use Discounts (CUDs) — GCP
# =============================================================================
# CUDs aplicam APENAS no instance cost (não no DBU rate).
# Aceita 1y ou 3y; "resource-based" (recursos específicos) ou "spend-based" (flexível).
# =============================================================================
reserved_instance_discounts:
  cud_1y_resource_pct: 25
  cud_3y_resource_pct: 55
  cud_1y_spend_pct: 20
  cud_3y_spend_pct: 46
  # CUDs spend-based são "flexible" — válidos pra qualquer instance family
  sustained_use_discount_max_pct: 30   # SUD auto-aplicado quando uso >25% do mês

# =============================================================================
# Photon Engine Modeling
# =============================================================================
photon_modeling:
  dbu_consumption_multiplier: 2.0
  typical_speedup_factor: 2.5
  break_even_speedup: 2.0
  not_recommended_for:
    - "PySpark UDFs em Python puro"
    - "Workloads I/O-bound (não CPU-bound)"
    - "ML training (use ML Runtime sem Photon)"
  # PR 2 (2026-05-28): Photon factor HETEROGÊNEO por SKU.
  factor_by_sku:
    jobs_compute: 2.9
    delta_live_tables: 2.9
    all_purpose_compute: 2.0

# =============================================================================
# Lakeflow Connect — Ingestão Managed (PR 2, 2026-05-28)
# =============================================================================
# Disponível em GCP per /product/sku-groups. Mesma estrutura de AWS/Azure.
lakeflow_connect:
  managed_connectors:
    cost_unit: dbu_h
    base_per_dbu: 0.35
    free_tier_dbu_per_workspace_per_day: 100
  zerobus_ingest:
    cost_unit: gb_ingested
    promo_until: "2026-09-01"
    per_gb_promo: 0.050
    per_gb_list: 0.100
  source_url: "https://www.databricks.com/product/pricing/lakeflow-connect"

# =============================================================================
# Lakebase — NÃO DISPONÍVEL em GCP (2026-05-28)
# =============================================================================
# Fonte: https://www.databricks.com/product/pricing/lakebase
# "Disponível AWS + Azure" — sem GCP. Bloco intencionalmente ausente.

# =============================================================================
# Model Serving (PR 3, 2026-05-28)
# =============================================================================
# CPU Serving: per concurrent request. GPU Serving: per GPU instance/hour.
# Mesma rate $/DBU = $0.07; diferença está no DBU/h consumido por instance.
# Fonte: https://www.databricks.com/product/pricing/model-serving
# Bills: "Serverless Real-time Inference" SKU.
model_serving:
  cost_unit: dbu_h
  cpu_per_dbu: 0.070                   # includes cloud instance
  gpu_per_dbu: 0.070                   # includes cloud instance
  source_url: "https://www.databricks.com/product/pricing/model-serving"

  # GPU Serving DBU rates por instance size (DBU/h)
  gpu_instances:
    small:       { gpu: "T4 ou equivalente",    dbu_per_hour: 10.48 }
    medium:      { gpu: "A10G x 1 GPU",         dbu_per_hour: 20.00 }
    medium_4x:   { gpu: "A10G x 4 GPUs",        dbu_per_hour: 112.00 }
    medium_8x:   { gpu: "A10G x 8 GPUs",        dbu_per_hour: 290.80 }
    large_8x_40: { gpu: "A100 40GB x 8 GPUs",   dbu_per_hour: 538.40 }
    large_8x_80: { gpu: "A100 80GB x 8 GPUs",   dbu_per_hour: 628.00 }

# =============================================================================
# Foundation Model Serving — open + open-source LLMs (PR 3, 2026-05-28)
# =============================================================================
# 3 modos: pay_per_token / provisioned_throughput / batch_inference.
# Rates aggregate: $/M input tok, $/M output tok, $/hour PT/Batch.
# Per-model DBU rates abaixo (12 modelos confirmados).
# Fonte: https://www.databricks.com/product/pricing/foundation-model-serving
foundation_model_serving:
  cost_unit: m_tokens                  # primary unit; PT/Batch usam $/h
  pay_per_token:
    input_per_m_tokens_usd: 0.50       # context ≤ 128K
    output_per_m_tokens_usd: 1.50
  provisioned_throughput:
    cost_unit: hour
    per_hour_per_pt_unit_usd: 6.00     # per-minute increments
    # Entry capacity: só Azure+AWS em US/Canada/Brasil para base models
    # Scaling capacity: standard PT increment
  batch_inference:
    cost_unit: hour
    per_hour_per_throughput_band_usd: 6.00

  # Per-model DBU rates (Pay-Per-Token + Provisioned Throughput)
  # DBU / M tokens (input/output) + DBU/h (entry/scaling PT capacity)
  per_model_dbu_rates:
    llama_4_maverick:    { input_dbu_per_m: 7.143,  output_dbu_per_m: 21.429, entry_pt_dbu_h: 85.714,  scaling_pt_dbu_h: 85.714 }
    llama_3_3_70b:       { input_dbu_per_m: 7.143,  output_dbu_per_m: 21.429, entry_pt_dbu_h: 85.714,  scaling_pt_dbu_h: 342.857 }
    qwen_3_next_80b:     { input_dbu_per_m: 2.143,  output_dbu_per_m: 17.143, entry_pt_dbu_h: 78.571,  scaling_pt_dbu_h: 78.571 }
    gpt_oss_120b:        { input_dbu_per_m: 2.143,  output_dbu_per_m: 8.571,  entry_pt_dbu_h: 71.429,  scaling_pt_dbu_h: 71.429 }
    gemma_3_12b:         { input_dbu_per_m: 2.143,  output_dbu_per_m: 7.143,  entry_pt_dbu_h: 71.429,  scaling_pt_dbu_h: 71.429 }
    llama_3_1_8b:        { input_dbu_per_m: 2.143,  output_dbu_per_m: 6.429,  entry_pt_dbu_h: 53.571,  scaling_pt_dbu_h: 106.000 }
    gpt_oss_20b:         { input_dbu_per_m: 1.000,  output_dbu_per_m: 4.286,  entry_pt_dbu_h: 53.571,  scaling_pt_dbu_h: 53.571 }
    llama_3_2_3b:        { input_dbu_per_m: null,   output_dbu_per_m: null,   entry_pt_dbu_h: 46.429,  scaling_pt_dbu_h: 92.857 }
    llama_3_2_1b:        { input_dbu_per_m: null,   output_dbu_per_m: null,   entry_pt_dbu_h: 42.857,  scaling_pt_dbu_h: 85.714 }
    qwen_3_06b_embed:    { input_dbu_per_m: 0.286,  output_dbu_per_m: null,   entry_pt_dbu_h: 25.000,  scaling_pt_dbu_h: 25.000 }
    gte:                 { input_dbu_per_m: 1.857,  output_dbu_per_m: null,   entry_pt_dbu_h: 20.000,  scaling_pt_dbu_h: 20.000 }
    bge_large:           { input_dbu_per_m: 1.429,  output_dbu_per_m: null,   entry_pt_dbu_h: 24.000,  scaling_pt_dbu_h: 24.000 }

  source_url: "https://www.databricks.com/product/pricing/foundation-model-serving"

# =============================================================================
# Proprietary Foundation Model Serving (PR 3, 2026-05-28)
# =============================================================================
# OpenAI + Anthropic + Gemini. Mesmo $0.07/DBU base; per-model DBU rates.
# Bills: AWS/GCP → "<Vendor> Model Serving" SKU. Azure → ADI Service (requires sales).
# Captura inicial: OpenAI GPT 5.x family. Anthropic/Gemini estrutura idêntica — TODO PR 4.
# Fonte: https://www.databricks.com/product/pricing/proprietary-foundation-model-serving
proprietary_foundation_model_serving:
  cost_unit: dbu_h
  base_per_dbu_pay_per_token: 0.07
  base_per_dbu_batch: 0.07
  source_url: "https://www.databricks.com/product/pricing/proprietary-foundation-model-serving"

  vendors:
    openai:
      models:
        # DBU / M tokens — Global Short context. In-geo = ~10% uplift, Long = 2x.
        gpt_5_5:           { input_dbu_per_m: 71.429,  output_dbu_per_m: 428.571,   cache_write_dbu_per_m: 71.429,  cache_read_dbu_per_m: 7.143,  batch_dbu_per_h: 214.286 }
        gpt_5_4_pro:       { input_dbu_per_m: 428.571, output_dbu_per_m: 2571.429,  cache_write_dbu_per_m: 428.571, cache_read_dbu_per_m: 42.857, batch_dbu_per_h: 1142.857 }
        gpt_5_4:           { input_dbu_per_m: 35.714,  output_dbu_per_m: 214.286,   cache_write_dbu_per_m: 35.714,  cache_read_dbu_per_m: 3.571,  batch_dbu_per_h: 192.857 }
        gpt_5_4_mini:      { input_dbu_per_m: 10.714,  output_dbu_per_m: 64.286,    cache_write_dbu_per_m: 10.714,  cache_read_dbu_per_m: 1.071,  batch_dbu_per_h: 107.143 }
        gpt_5_4_nano:      { input_dbu_per_m: 2.857,   output_dbu_per_m: 17.857,    cache_write_dbu_per_m: 2.857,   cache_read_dbu_per_m: 0.286,  batch_dbu_per_h: 71.429 }
        gpt_5:             { input_dbu_per_m: 17.857,  output_dbu_per_m: 142.857,   cache_write_dbu_per_m: 17.857,  cache_read_dbu_per_m: 1.786,  batch_dbu_per_h: 131.429 }
        gpt_5_mini:        { input_dbu_per_m: 3.571,   output_dbu_per_m: 28.571,    cache_write_dbu_per_m: 3.571,   cache_read_dbu_per_m: 0.357,  batch_dbu_per_h: 71.429 }
        gpt_5_nano:        { input_dbu_per_m: 0.714,   output_dbu_per_m: 5.714,     cache_write_dbu_per_m: 0.714,   cache_read_dbu_per_m: 0.071,  batch_dbu_per_h: 53.571 }
        gpt_5_2_codex:     { input_dbu_per_m: 25.000,  output_dbu_per_m: 200.000,   cache_write_dbu_per_m: 25.000,  cache_read_dbu_per_m: 2.500,  batch_dbu_per_h: null }
        gpt_5_1_codex_max: { input_dbu_per_m: 17.857,  output_dbu_per_m: 142.857,   cache_write_dbu_per_m: 17.857,  cache_read_dbu_per_m: 1.786,  batch_dbu_per_h: null }
    anthropic:
      # Estrutura idêntica ao OpenAI. Per-model rates: TODO capturar via Chrome MCP em PR 4.
      _todo: "Tabela completa em https://www.databricks.com/product/pricing/proprietary-foundation-model-serving (select Anthropic)"
    gemini:
      # Mesma estrutura. TODO PR 4.
      _todo: "Tabela completa em https://www.databricks.com/product/pricing/proprietary-foundation-model-serving (select Gemini)"

# =============================================================================
# Vector Search v2 (PR 3, 2026-05-28)
# =============================================================================
# Refactor do vector_search legacy. Oficial: 2 tiers (Standard 2M / Storage Optimized 64M).
# Bills: "Serverless Real-time Inference" SKU. Effective $/DBU US East = $0.07.
# Fonte: https://www.databricks.com/product/pricing/vector-search
vector_search_v2:
  cost_unit: hour_per_unit
  effective_dollar_per_dbu_us_east: 0.07
  effective_dollar_per_dbu_ap_regions: 0.088  # ~25% uplift
  source_url: "https://www.databricks.com/product/pricing/vector-search"

  tiers:
    standard:
      compute_per_hour_usd: 0.28
      storage_per_gb_month_usd: 0.230   # first 30 GB free
      storage_free_gb: 30
      vector_capacity_per_unit: 2000000  # 2M vectors per unit
      dbu_per_hour: 4.00
    storage_optimized:
      compute_per_hour_usd: 1.28
      storage_per_gb_month_usd: 0.046
      storage_free_gb: 0
      vector_capacity_per_unit: 64000000  # 64M vectors per unit
      dbu_per_hour: 18.286

# =============================================================================
# AI Functions (PR 3, 2026-05-28)
# =============================================================================
# Parse + Extract + Classify de unstructured data. Bills: "Serverless Real-time Inference".
# Promo 50% off até 2026-06-30.
# Fonte: https://www.databricks.com/product/pricing/ai-functions
ai_functions:
  cost_unit: dbu_h
  promo_until: "2026-06-30"
  ai_parse_document:
    per_dbu_promo: 0.070
    per_dbu_list: 0.140
    note: "Parse PDFs/docs → Delta tables; DBU/1k pages varia: 10-90 conforme complexity"
  ai_extract:
    per_dbu_promo: 0.070
    per_dbu_list: 0.140
    note: "Extract estruturado de spark binary; requer ai_parse_document antes"
  ai_classify:
    per_dbu_promo: 0.070
    per_dbu_list: 0.140
    note: "Classify spark binary; requer ai_parse_document antes"
  source_url: "https://www.databricks.com/product/pricing/ai-functions"

# =============================================================================
# AI Gateway (PR 3, 2026-05-28)
# =============================================================================
