# =============================================================================
# Spot Instance Discount Estimates
# =============================================================================
# AWS Spot pode dar até 90% off vs On-Demand, mas interrupção 2min de aviso.
# Valores: médias de 90 dias por region. Real flutua MUITO.
# =============================================================================
spot_discounts:
  us-east-1:
    avg_discount_pct: 80
    interrupt_rate_hourly: "<5%"
    suitable_for: "Jobs batch, training ML tolerante a falha"

  us-west-2:
    avg_discount_pct: 78
    interrupt_rate_hourly: "<5%"

  sa-east-1:
    avg_discount_pct: 60
    interrupt_rate_hourly: "10-15%"
    suitable_for: "Limitado — capacity reduzida em SP"

  eu-west-1:
    avg_discount_pct: 70
    interrupt_rate_hourly: "5-10%"

  eu-central-1:
    avg_discount_pct: 72
    interrupt_rate_hourly: "5-10%"

# =============================================================================
# Storage — S3
# =============================================================================
storage:
  s3:
    standard_per_gb_month_usd: 0.023
    standard_ia_per_gb_month_usd: 0.0125
    one_zone_ia_per_gb_month_usd: 0.01
    glacier_instant_per_gb_month_usd: 0.004
    glacier_flexible_per_gb_month_usd: 0.0036
    glacier_deep_archive_per_gb_month_usd: 0.00099

  operations:
    get_per_1k: 0.0004
    put_per_1k: 0.005
    list_per_1k: 0.005

  delta_lake_overhead_pct: 10

# =============================================================================
# Networking
# =============================================================================
networking:
  privatelink_endpoint_per_hour: 0.014
  privatelink_data_per_gb: 0.0035
  nat_gateway_per_hour: 0.045
  nat_gateway_per_gb: 0.045

  egress:
    us_outbound_per_gb: 0.09       # primeiros 10 TB
    br_outbound_per_gb: 0.15
    eu_outbound_per_gb: 0.09
    cross_region_us_per_gb: 0.02
    cross_region_intl_per_gb: 0.02

# =============================================================================
# Reserved Instances (EC2 RI) Discounts
# =============================================================================
# Aplica APENAS no compute (instance), não no DBU rate.
# =============================================================================
reserved_instance_discounts:
  reserved_1y_no_upfront_pct: 25
  reserved_1y_partial_upfront_pct: 28
  reserved_1y_all_upfront_pct: 32
  reserved_3y_no_upfront_pct: 45
  reserved_3y_partial_upfront_pct: 52
  reserved_3y_all_upfront_pct: 58
  savings_plan_compute_1y_pct: 27
  savings_plan_compute_3y_pct: 50
  savings_plan_ec2_instance_1y_pct: 32
  savings_plan_ec2_instance_3y_pct: 60

# =============================================================================
# Photon Engine Modeling
# =============================================================================
photon_modeling:
  dbu_consumption_multiplier: 2.0
  typical_speedup_factor: 2.5
  break_even_speedup: 2.0
  not_recommended_for:
    - "PySpark UDFs em Python puro"
    - "Workloads I/O-bound (não CPU-bound)"
    - "ML training (use ML Runtime sem Photon)"
  # PR 2 (2026-05-28): Photon factor HETEROGÊNEO por SKU (Databricks oficial).
  factor_by_sku:
    jobs_compute: 2.9
    delta_live_tables: 2.9
    all_purpose_compute: 2.0

# =============================================================================
# Lakebase — Database Serverless (PR 2, 2026-05-28)
# =============================================================================
# Postgres managed. Disponível AWS + Azure (sem GCP).
# Nova unidade: Capacity Unit Hour ($/CU·h).
# IMPORTANTE: preços promocional (50% off) válidos até 2027-01-31.
# Fonte: https://www.databricks.com/product/pricing/lakebase
lakebase:
  cost_unit: cu_h
  promo_until: "2027-01-31"
  autoscaling_per_cu_h_promo: 0.092
  autoscaling_per_cu_h_list: 0.184
  always_on_min_per_cu_h_promo: 0.069
  always_on_min_per_cu_h_list: 0.138
  storage_per_gb_month: 0.345
  source_url: "https://www.databricks.com/product/pricing/lakebase"
  available_clouds: ["azure", "aws"]

# =============================================================================
# Lakeflow Connect — Ingestão Managed (PR 2, 2026-05-28)
# =============================================================================
# Managed Connectors + Zerobus Ingest.
# Fonte: https://www.databricks.com/product/pricing/lakeflow-connect
lakeflow_connect:
  managed_connectors:
    cost_unit: dbu_h
    base_per_dbu: 0.35
    free_tier_dbu_per_workspace_per_day: 100
  zerobus_ingest:
    cost_unit: gb_ingested
    promo_until: "2026-09-01"
    per_gb_promo: 0.050
    per_gb_list: 0.100
  source_url: "https://www.databricks.com/product/pricing/lakeflow-connect"

# =============================================================================
# Model Serving (PR 3, 2026-05-28)
# =============================================================================
# CPU Serving: per concurrent request. GPU Serving: per GPU instance/hour.
# Mesma rate $/DBU = $0.07; diferença está no DBU/h consumido por instance.
# Fonte: https://www.databricks.com/product/pricing/model-serving
# Bills: "Serverless Real-time Inference" SKU.
model_serving:
  cost_unit: dbu_h
  cpu_per_dbu: 0.070                   # includes cloud instance
  gpu_per_dbu: 0.070                   # includes cloud instance
  source_url: "https://www.databricks.com/product/pricing/model-serving"

  # GPU Serving DBU rates por instance size (DBU/h)
  gpu_instances:
    small:       { gpu: "T4 ou equivalente",    dbu_per_hour: 10.48 }
    medium:      { gpu: "A10G x 1 GPU",         dbu_per_hour: 20.00 }
    medium_4x:   { gpu: "A10G x 4 GPUs",        dbu_per_hour: 112.00 }
    medium_8x:   { gpu: "A10G x 8 GPUs",        dbu_per_hour: 290.80 }
    large_8x_40: { gpu: "A100 40GB x 8 GPUs",   dbu_per_hour: 538.40 }
    large_8x_80: { gpu: "A100 80GB x 8 GPUs",   dbu_per_hour: 628.00 }

# =============================================================================
# Foundation Model Serving — open + open-source LLMs (PR 3, 2026-05-28)
# =============================================================================
# 3 modos: pay_per_token / provisioned_throughput / batch_inference.
# Rates aggregate: $/M input tok, $/M output tok, $/hour PT/Batch.
# Per-model DBU rates abaixo (12 modelos confirmados).
# Fonte: https://www.databricks.com/product/pricing/foundation-model-serving
foundation_model_serving:
  cost_unit: m_tokens                  # primary unit; PT/Batch usam $/h
  pay_per_token:
    input_per_m_tokens_usd: 0.50       # context ≤ 128K
    output_per_m_tokens_usd: 1.50
  provisioned_throughput:
    cost_unit: hour
    per_hour_per_pt_unit_usd: 6.00     # per-minute increments
    # Entry capacity: só Azure+AWS em US/Canada/Brasil para base models
    # Scaling capacity: standard PT increment
  batch_inference:
    cost_unit: hour
    per_hour_per_throughput_band_usd: 6.00

  # Per-model DBU rates (Pay-Per-Token + Provisioned Throughput)
  # DBU / M tokens (input/output) + DBU/h (entry/scaling PT capacity)
  per_model_dbu_rates:
    llama_4_maverick:    { input_dbu_per_m: 7.143,  output_dbu_per_m: 21.429, entry_pt_dbu_h: 85.714,  scaling_pt_dbu_h: 85.714 }
    llama_3_3_70b:       { input_dbu_per_m: 7.143,  output_dbu_per_m: 21.429, entry_pt_dbu_h: 85.714,  scaling_pt_dbu_h: 342.857 }
    qwen_3_next_80b:     { input_dbu_per_m: 2.143,  output_dbu_per_m: 17.143, entry_pt_dbu_h: 78.571,  scaling_pt_dbu_h: 78.571 }
    gpt_oss_120b:        { input_dbu_per_m: 2.143,  output_dbu_per_m: 8.571,  entry_pt_dbu_h: 71.429,  scaling_pt_dbu_h: 71.429 }
    gemma_3_12b:         { input_dbu_per_m: 2.143,  output_dbu_per_m: 7.143,  entry_pt_dbu_h: 71.429,  scaling_pt_dbu_h: 71.429 }
    llama_3_1_8b:        { input_dbu_per_m: 2.143,  output_dbu_per_m: 6.429,  entry_pt_dbu_h: 53.571,  scaling_pt_dbu_h: 106.000 }
    gpt_oss_20b:         { input_dbu_per_m: 1.000,  output_dbu_per_m: 4.286,  entry_pt_dbu_h: 53.571,  scaling_pt_dbu_h: 53.571 }
    llama_3_2_3b:        { input_dbu_per_m: null,   output_dbu_per_m: null,   entry_pt_dbu_h: 46.429,  scaling_pt_dbu_h: 92.857 }
    llama_3_2_1b:        { input_dbu_per_m: null,   output_dbu_per_m: null,   entry_pt_dbu_h: 42.857,  scaling_pt_dbu_h: 85.714 }
    qwen_3_06b_embed:    { input_dbu_per_m: 0.286,  output_dbu_per_m: null,   entry_pt_dbu_h: 25.000,  scaling_pt_dbu_h: 25.000 }
    gte:                 { input_dbu_per_m: 1.857,  output_dbu_per_m: null,   entry_pt_dbu_h: 20.000,  scaling_pt_dbu_h: 20.000 }
    bge_large:           { input_dbu_per_m: 1.429,  output_dbu_per_m: null,   entry_pt_dbu_h: 24.000,  scaling_pt_dbu_h: 24.000 }

  source_url: "https://www.databricks.com/product/pricing/foundation-model-serving"

# =============================================================================
# Proprietary Foundation Model Serving (PR 3, 2026-05-28)
# =============================================================================
# OpenAI + Anthropic + Gemini. Mesmo $0.07/DBU base; per-model DBU rates.
# Bills: AWS/GCP → "<Vendor> Model Serving" SKU. Azure → ADI Service (requires sales).
# Captura inicial: OpenAI GPT 5.x family. Anthropic/Gemini estrutura idêntica — TODO PR 4.
# Fonte: https://www.databricks.com/product/pricing/proprietary-foundation-model-serving
proprietary_foundation_model_serving:
  cost_unit: dbu_h
  base_per_dbu_pay_per_token: 0.07
  base_per_dbu_batch: 0.07
  source_url: "https://www.databricks.com/product/pricing/proprietary-foundation-model-serving"

  vendors:
    openai:
      models:
        # DBU / M tokens — Global Short context. In-geo = ~10% uplift, Long = 2x.
        gpt_5_5:           { input_dbu_per_m: 71.429,  output_dbu_per_m: 428.571,   cache_write_dbu_per_m: 71.429,  cache_read_dbu_per_m: 7.143,  batch_dbu_per_h: 214.286 }
        gpt_5_4_pro:       { input_dbu_per_m: 428.571, output_dbu_per_m: 2571.429,  cache_write_dbu_per_m: 428.571, cache_read_dbu_per_m: 42.857, batch_dbu_per_h: 1142.857 }
        gpt_5_4:           { input_dbu_per_m: 35.714,  output_dbu_per_m: 214.286,   cache_write_dbu_per_m: 35.714,  cache_read_dbu_per_m: 3.571,  batch_dbu_per_h: 192.857 }
        gpt_5_4_mini:      { input_dbu_per_m: 10.714,  output_dbu_per_m: 64.286,    cache_write_dbu_per_m: 10.714,  cache_read_dbu_per_m: 1.071,  batch_dbu_per_h: 107.143 }
        gpt_5_4_nano:      { input_dbu_per_m: 2.857,   output_dbu_per_m: 17.857,    cache_write_dbu_per_m: 2.857,   cache_read_dbu_per_m: 0.286,  batch_dbu_per_h: 71.429 }
