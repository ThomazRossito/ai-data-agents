  - tier_min_usd_year: 10000
    tier_max_usd_year: 100000
    discount_pct_1y: 15
    discount_pct_3y: 22

  - tier_min_usd_year: 100000
    tier_max_usd_year: 500000
    discount_pct_1y: 22
    discount_pct_3y: 30

  - tier_min_usd_year: 500000
    tier_max_usd_year: 1500000
    discount_pct_1y: 28
    discount_pct_3y: 35

  - tier_min_usd_year: 1500000
