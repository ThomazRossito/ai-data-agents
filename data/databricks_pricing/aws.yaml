# =============================================================================
# Databricks Pricing Catalog — AWS
# =============================================================================
# Fonte primária: https://www.databricks.com/product/pricing
# Fonte secundária (instance types): https://www.databricks.com/product/pricing/product-pricing/instance-types
# Instance prices: consultados em RUNTIME via AWS Pricing API
#   (https://pricing.us-east-1.amazonaws.com/offers/v1.0/aws/AmazonEC2/current/)
#
# Atualização: trimestral via scripts/refresh_databricks_pricing.py
#
# ATENÇÃO: TODOS os valores DBU rates abaixo são reference pricing PAYG (retail).
# Não cobrem descontos negociados Enterprise, custom contracts.
# =============================================================================

schema_version: "1.0.0"
cloud: aws
last_updated: "2026-05-28"
last_verified_against_source: "2026-05-28"
source_url: "https://www.databricks.com/product/pricing"
audit_doc: "kb/databricks-pricing/extracted-prices-raw.md"
notes: |
  DBU rates verificados via Chrome MCP em 2026-05-28 (25 sub-páginas oficiais).
  Catalog ajustado em PR 1 (foundational refactor):
    - Tier 'standard' DEPRECATED (não consta nas páginas oficiais)
    - AWS publica oficialmente Premium e Enterprise (Azure só Premium = AWS Enterprise)
    - serverless_compute corrigido: $0.95 (fictício) → $0.35 (Jobs Serverless real)
  PR 2 (próximo) vai separar serverless_compute em sub-tipos
  (jobs_serverless $0.35, dlt_serverless $0.35, sql_serverless $0.70, all_purpose_serverless $0.75)
  e adicionar Lakebase, Lakeflow Connect, GCP scaffold.
  Instance prices buscados via AWS Pricing API em runtime.
  Spot rates extremamente voláteis — valores aqui são MÉDIAS de 90 dias.

# =============================================================================
# Regions suportadas
# =============================================================================
regions:
  - id: us-east-1
    display_name: "US East (N. Virginia)"
    aws_region_code: us-east-1
    primary: true  # default Databricks AWS

  - id: us-west-2
    display_name: "US West (Oregon)"
    aws_region_code: us-west-2

  - id: sa-east-1
    display_name: "South America (São Paulo)"
    aws_region_code: sa-east-1

  - id: eu-west-1
    display_name: "EU (Ireland)"
    aws_region_code: eu-west-1

  - id: eu-central-1
    display_name: "EU (Frankfurt)"
    aws_region_code: eu-central-1

# =============================================================================
# DBU Rates (USD por DBU·hora) — AWS
# =============================================================================
dbu_rates_per_hour:

  # All-Purpose Compute (Premium/Enterprise tiers — Standard DEPRECATED)
  # Oficial 2026-05-28: AWS Premium All-Purpose Classic = $0.55/DBU (datascience-ml).
  all_purpose_compute:
    standard:
      # DEPRECATED: tier 'standard' não consta em /product/pricing/datascience-ml.
      # Mantido em PR 1 pra back-compat; será removido em PR 2.
      no_photon: 0.40
      photon: 0.55
      _deprecated: true
    premium:
      no_photon: 0.55
      photon: 0.65
    enterprise:
      no_photon: 0.65
      photon: 0.85

  # Jobs Compute (Premium/Enterprise — Standard DEPRECATED)
  # Oficial 2026-05-28: AWS Premium Jobs Classic = $0.15/DBU (lakeflow-jobs).
  # Azure Premium = AWS Enterprise (= $0.20/DBU AWS).
  jobs_compute:
    standard:
      # DEPRECATED: tier 'standard' não consta em /product/pricing/lakeflow-jobs.
      no_photon: 0.10
      photon: 0.15
      _deprecated: true
    premium:
      no_photon: 0.15
      photon: 0.22
    enterprise:
      no_photon: 0.20
      photon: 0.30

  # Serverless Compute — backward-compat alias (DEPRECATED em PR 3)
  # Sempre que possível, usar os sub-types específicos abaixo.
  serverless_compute:
    base_per_dbu: 0.35
    _deprecated: true
    _deprecated_note: "Use jobs_serverless / dlt_serverless / sql_serverless / all_purpose_serverless"

  # Jobs Serverless Compute — PR 2 (2026-05-28)
  # Fonte: https://www.databricks.com/product/pricing/lakeflow-jobs
  jobs_serverless:
    base_per_dbu: 0.35
    photon_auto_enabled: true
    modes: ["standard", "performance_optimized"]

  # DLT Serverless Compute — PR 2 (2026-05-28)
  # Fonte: https://www.databricks.com/product/pricing/lakeflow-spark-declarative-pipelines
  dlt_serverless:
    base_per_dbu: 0.35
    photon_auto_enabled: true
    modes: ["standard", "performance_optimized"]

  # All-Purpose Serverless Compute — PR 2 (2026-05-28)
  # Fonte: https://www.databricks.com/product/pricing/datascience-ml
  all_purpose_serverless:
    base_per_dbu: 0.75
    photon_auto_enabled: true
    photon_factor_classic: 2.0

  # SQL Serverless: já existe em sql.serverless ($0.70/DBU acima)

  # Delta Live Tables
  delta_live_tables:
    core: 0.20
    pro: 0.25
    advanced: 0.36

  # SQL Warehouse
  sql:
    classic: 0.22
    pro: 0.55
    serverless: 0.70

  # Model Serving
  model_serving:
    cpu_per_dbu: 0.07
    gpu_t4_per_dbu: 0.07
    gpu_a10_per_dbu: 0.07

  # Vector Search
  vector_search:
    storage_endpoint_per_hour: 0.45
    storage_per_million_vectors_month: 0.18
    query_per_million_queries: 1.00

  # Mosaic AI Agent Framework
  mosaic_agent:
    serverless_per_dbu: 0.95

