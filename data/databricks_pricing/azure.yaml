  Standard_DS5_v2: { dbu_per_hour: 3.00, vcpu: 16, ram_gb: 56 }

  # Memory Optimized DSv2
  Standard_DS12_v2: { dbu_per_hour: 1.50, vcpu: 4, ram_gb: 28 }
  Standard_DS13_v2: { dbu_per_hour: 3.00, vcpu: 8, ram_gb: 56 }
  Standard_DS14_v2: { dbu_per_hour: 6.00, vcpu: 16, ram_gb: 112 }
  Standard_DS15_v2: { dbu_per_hour: 8.00, vcpu: 20, ram_gb: 140 }

  # Memory Optimized Eds_v4
  Standard_E4ds_v4: { dbu_per_hour: 1.00, vcpu: 4, ram_gb: 32 }
  Standard_E8ds_v4: { dbu_per_hour: 2.00, vcpu: 8, ram_gb: 64 }
  Standard_E16ds_v4: { dbu_per_hour: 4.00, vcpu: 16, ram_gb: 128 }
  Standard_E32ds_v4: { dbu_per_hour: 8.00, vcpu: 32, ram_gb: 256 }
  Standard_E64ds_v4: { dbu_per_hour: 16.00, vcpu: 64, ram_gb: 504 }

  # Compute Optimized Fs_v2
  Standard_F4s_v2: { dbu_per_hour: 0.75, vcpu: 4, ram_gb: 8 }
  Standard_F8s_v2: { dbu_per_hour: 1.50, vcpu: 8, ram_gb: 16 }
  Standard_F16s_v2: { dbu_per_hour: 3.00, vcpu: 16, ram_gb: 32 }
  Standard_F32s_v2: { dbu_per_hour: 6.00, vcpu: 32, ram_gb: 64 }
  Standard_F64s_v2: { dbu_per_hour: 12.00, vcpu: 64, ram_gb: 128 }
  Standard_F72s_v2: { dbu_per_hour: 13.50, vcpu: 72, ram_gb: 144 }

  # Storage Optimized Ls_v2
  Standard_L8s_v2: { dbu_per_hour: 2.00, vcpu: 8, ram_gb: 64 }
  Standard_L16s_v2: { dbu_per_hour: 4.00, vcpu: 16, ram_gb: 128 }
  Standard_L32s_v2: { dbu_per_hour: 8.00, vcpu: 32, ram_gb: 256 }
  Standard_L64s_v2: { dbu_per_hour: 16.00, vcpu: 64, ram_gb: 512 }
  Standard_L80s_v2: { dbu_per_hour: 20.00, vcpu: 80, ram_gb: 640 }

  # GPU NC-series (Model Serving / training)
  Standard_NC6s_v3: { dbu_per_hour: 4.40, vcpu: 6, ram_gb: 112, gpu: 1, gpu_type: "V100" }
  Standard_NC12s_v3: { dbu_per_hour: 8.80, vcpu: 12, ram_gb: 224, gpu: 2, gpu_type: "V100" }
