# =============================================================================
# DBCU Commit Discounts (Databricks Commit Unit)
# =============================================================================
# Desconto progressivo por volume anual contratado.
# Valores ILUSTRATIVOS baseados em contratos enterprise comuns —
# desconto real é negociado caso-a-caso.
# =============================================================================
dbcu_commit_discounts:
  - tier_min_usd_year: 0
    tier_max_usd_year: 10000
    discount_pct_1y: 0
    discount_pct_3y: 0
    note: "Sem desconto — pay-as-you-go"

  - tier_min_usd_year: 10000
    tier_max_usd_year: 100000
    discount_pct_1y: 15
    discount_pct_3y: 22

  - tier_min_usd_year: 100000
    tier_max_usd_year: 500000
    discount_pct_1y: 22
    discount_pct_3y: 30

  - tier_min_usd_year: 500000
    tier_max_usd_year: 1500000
    discount_pct_1y: 28
    discount_pct_3y: 35

  - tier_min_usd_year: 1500000
    tier_max_usd_year: null
    discount_pct_1y: 32
    discount_pct_3y: 40

# =============================================================================
# Spot / Low-Priority VM Discount Estimates
# =============================================================================
# Azure Spot VMs oferecem desconto até ~90% vs on-demand, mas podem ser
# interrompidas com 30s de aviso. Discount real flutua por região e demanda.
# Valores aqui são MÉDIAS observadas — não garantidas.
# =============================================================================
spot_discounts:
  brazilsouth:
    avg_discount_pct: 65
    interrupt_rate_hourly: "5-10%"
    suitable_for: "Jobs batch sem SLA crítico"

  eastus:
    avg_discount_pct: 80
    interrupt_rate_hourly: "2-5%"
    suitable_for: "Workloads tolerantes a falha"

  eastus2:
    avg_discount_pct: 78
    interrupt_rate_hourly: "3-6%"

  westus2:
    avg_discount_pct: 75
    interrupt_rate_hourly: "3-6%"

  westeurope:
    avg_discount_pct: 70
    interrupt_rate_hourly: "4-8%"

  northeurope:
    avg_discount_pct: 72
    interrupt_rate_hourly: "4-8%"

# =============================================================================
# Storage — Azure Data Lake Storage Gen2 (subjacente ao Lakehouse)
# =============================================================================
storage:
  adls_gen2:
    hot_per_gb_month_usd: 0.0184
    cool_per_gb_month_usd: 0.01
    cold_per_gb_month_usd: 0.0036
    archive_per_gb_month_usd: 0.00099

  operations:
    read_per_10k: 0.0044
    write_per_10k: 0.0648
    list_per_10k: 0.0648

  delta_lake_overhead_pct: 10  # overhead estimado vs Parquet raw

# =============================================================================
# Networking
# =============================================================================
networking:
  private_link_endpoint_per_hour: 0.013
  vnet_peering_inbound_per_gb: 0.0089
  vnet_peering_outbound_per_gb: 0.0089

  egress:
    us_outbound_per_gb: 0.0875
    br_outbound_per_gb: 0.181
    eu_outbound_per_gb: 0.087

# =============================================================================
# Reserved Instances Multipliers (Azure Hybrid Benefit + Reserved)
# =============================================================================
# Desconto vs On-Demand quando user tem Azure Hybrid Benefit OU compra RI.
# Aplica APENAS no compute (instance cost), não no DBU rate.
# =============================================================================
reserved_instance_discounts:
  hybrid_benefit_only_pct: 30          # Windows License savings
  reserved_1y_no_upfront_pct: 25
  reserved_1y_partial_upfront_pct: 27
  reserved_1y_all_upfront_pct: 29
  reserved_3y_no_upfront_pct: 50
  reserved_3y_partial_upfront_pct: 52
  reserved_3y_all_upfront_pct: 55
  savings_plan_compute_1y_pct: 27
  savings_plan_compute_3y_pct: 52

# =============================================================================
# Photon Engine Multipliers
# =============================================================================
# Photon habilitado aumenta DBU consumption mas reduz wall-clock time.
# Para queries SQL típicas: ~2-3x speedup, custo final geralmente ~30% menor.
# Para PySpark UDFs: Photon não acelera, custo é apenas maior.
# =============================================================================
photon_modeling:
  dbu_consumption_multiplier: 2.0      # DBU consumido por hora dobra com Photon
  typical_speedup_factor: 2.5          # típico em SQL queries
  break_even_speedup: 2.0              # acima disso, Photon vale a pena
  not_recommended_for:
    - "PySpark UDFs em Python puro"
    - "Workloads I/O-bound (não CPU-bound)"
    - "ML training (use ML Runtime sem Photon)"
