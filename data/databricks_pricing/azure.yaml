# =============================================================================
# Databricks Pricing Catalog — Azure
# =============================================================================
# Fonte primária: https://www.databricks.com/product/pricing
# Fonte secundária (instance types): https://www.databricks.com/product/pricing/product-pricing/instance-types
# Instance prices: consultados em RUNTIME via Azure Retail Prices API
#   (https://prices.azure.com/api/retail/prices)
#
# Atualização: trimestral via scripts/refresh_databricks_pricing.py
# Validação: ver tests/unit/test_cost_engine_databricks.py
#
# ATENÇÃO: TODOS os valores DBU rates abaixo são reference pricing PAYG (retail).
# Não cobrem descontos negociados Enterprise, MCA, CSP ou contratos custom.
# =============================================================================

schema_version: "1.0.0"
cloud: azure
last_updated: "2026-05-28"
last_verified_against_source: "2026-05-28"
source_url: "https://www.databricks.com/product/pricing"
audit_doc: "kb/databricks-pricing/extracted-prices-raw.md"
notes: |
  DBU rates verificados via Chrome MCP em 2026-05-28 (25 sub-páginas oficiais).
  Catalog ajustado em PR 1 (foundational refactor):
    - Tier 'standard' DEPRECATED (não consta nas páginas oficiais)
    - Azure Databricks publica apenas 'premium' — corresponde a 'enterprise' em AWS/GCP
    - serverless_compute corrigido: $0.95 (fictício) → $0.35 (Jobs Serverless real)
  PR 2 (próximo) vai separar serverless_compute em sub-tipos
  (jobs_serverless $0.35, dlt_serverless $0.35, sql_serverless $0.70, all_purpose_serverless $0.75)
  e adicionar Lakebase, Lakeflow Connect, GCP scaffold.
  Instance prices serão buscados via Azure Retail Prices API em runtime.
  Spot/Low-priority é estimativa — variabilidade real depende de demanda Azure.

# =============================================================================
# Regions suportadas
# =============================================================================
regions:
  - id: brazilsouth
    display_name: "Brazil South (São Paulo)"
    azure_region_code: brazilsouth
    primary: true  # foco BR no MVP

  - id: eastus
    display_name: "US East (Virginia)"
    azure_region_code: eastus

  - id: eastus2
    display_name: "US East 2"
    azure_region_code: eastus2

  - id: westus2
    display_name: "US West 2 (Washington)"
    azure_region_code: westus2

  - id: westeurope
    display_name: "West Europe (Netherlands)"
    azure_region_code: westeurope

  - id: northeurope
    display_name: "North Europe (Ireland)"
    azure_region_code: northeurope

# =============================================================================
# DBU Rates (USD por DBU·hora)
# =============================================================================
# Modelo: cost = DBU_rate × DBU_per_node × num_nodes × hours
# Photon: pode dobrar o DBU consumption mas reduz wall-clock time
#         (não está embutido aqui — controla via flag no calculate_cost)
# =============================================================================
dbu_rates_per_hour:

  # All-Purpose Compute (notebooks interativos, exploração)
  # Oficial 2026-05-28: Premium $0.55/DBU (datascience-ml page).
  all_purpose_compute:
    standard:
      # DEPRECATED: tier 'standard' não consta em /product/pricing/datascience-ml.
      # Mantido em PR 1 pra back-compat; será removido em PR 2.
      no_photon: 0.40
      photon: 0.55
      _deprecated: true
    premium:
      no_photon: 0.55
      photon: 0.65
    # Azure não publica 'enterprise' separado — Azure Premium = AWS/GCP Enterprise.
    # Catalog AWS/GCP terá bloco enterprise:.

  # Jobs Compute (workloads scheduled, ETL)
  # Oficial 2026-05-28: Premium $0.20/DBU (lakeflow-jobs page, Azure-specific).
  # NOTA: AWS Premium Jobs Classic = $0.15/DBU. Azure ~33% acima (consistente com
  #       fato "Azure Premium = AWS Enterprise"). Premium AWS = $0.15, Enterprise AWS = $0.20.
  jobs_compute:
    standard:
      # DEPRECATED: tier 'standard' não consta em /product/pricing/lakeflow-jobs.
      no_photon: 0.15
      photon: 0.22
      _deprecated: true
    premium:
      no_photon: 0.20
      photon: 0.30

  # Serverless Compute — backward-compat alias (DEPRECATED em PR 3)
  # Sempre que possível, usar os sub-types específicos abaixo.
  # Default = jobs_serverless rate ($0.35) pela frequência de uso.
  serverless_compute:
    base_per_dbu: 0.35
    _deprecated: true
    _deprecated_note: "Use jobs_serverless / dlt_serverless / sql_serverless / all_purpose_serverless"

  # Jobs Serverless Compute — PR 2 (2026-05-28)
  # Fonte: https://www.databricks.com/product/pricing/lakeflow-jobs (view Premium/AWS)
  # Modes: Performance Optimized + Standard. Photon auto-enabled (não toggle).
  jobs_serverless:
    base_per_dbu: 0.35
    photon_auto_enabled: true
    modes: ["standard", "performance_optimized"]
    # Standard mode: "up to 70% cheaper" — heurística, não preço fixo

  # DLT Serverless Compute — PR 2 (2026-05-28)
  # Fonte: https://www.databricks.com/product/pricing/lakeflow-spark-declarative-pipelines
  dlt_serverless:
    base_per_dbu: 0.35
    photon_auto_enabled: true
    modes: ["standard", "performance_optimized"]

  # All-Purpose Serverless Compute — PR 2 (2026-05-28)
  # Fonte: https://www.databricks.com/product/pricing/datascience-ml (view Premium/AWS)
  # Photon factor classic = 2.0X (diferente de Jobs/DLT 2.9X).
  all_purpose_serverless:
    base_per_dbu: 0.75
    photon_auto_enabled: true
    photon_factor_classic: 2.0  # ref pra Photon Classic; Serverless tem auto-on

  # SQL Serverless já existe acima em sql.serverless ($0.70/DBU)
  # Fonte: https://www.databricks.com/product/pricing/databricks-sql

  # Delta Live Tables
  delta_live_tables:
    core: 0.20
    pro: 0.25
    advanced: 0.36

  # SQL Warehouse
  sql:
    classic: 0.22
    pro: 0.55
    serverless: 0.70

  # Model Serving (real-time inference)
  model_serving:
    cpu_per_dbu: 0.07
    gpu_t4_per_dbu: 0.07
    gpu_a10_per_dbu: 0.07
    # Compute-hour rate × DBU multiplier conforme instance

  # Vector Search (RAG, semantic search)
  vector_search:
    storage_endpoint_per_hour: 0.45
    storage_per_million_vectors_month: 0.18
    query_per_million_queries: 1.00

  # Mosaic AI Agent Framework
  mosaic_agent:
    serverless_per_dbu: 0.95

