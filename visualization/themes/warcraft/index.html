<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOMA Guild Hall · V2 (Warcraft theme)</title>

  <!-- ============================================================
       Warcraft theme — paleta high-fantasy / Alliance tavern
       Backend reutilizado do tema Minecraft (mesmo WebSocket /events,
       mesmo registry /agents, mesmo broker, mesmos JSONLs).
       Status: WIP — Fase 1 (shell + WebSocket connect).
       ============================================================ -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=MedievalSharp&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-stone:     #1a0f08;
      --bg-tavern:    #2d1810;
      --bg-warm:      #3d2415;
      --wood:         #5c3a1e;
      --wood-light:   #8B5A2B;
      --gold:         #D4AF37;
      --gold-bright:  #FCD34D;
      --bronze:       #A16207;
      --parchment:    #E8D5A8;
      --blood:        #B91C1C;
      --mage-blue:    #2563EB;
      --warlock:      #7C3AED;
      --druid-green:  #16A34A;
      --priest-white: #E5E7EB;
      --fire-orange:  #FF6B35;
      --text-warm:    #F5E6D3;
      --text-faded:   #B8A988;
      --text-dim:     #8B7355;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center,
        var(--bg-warm) 0%,
        var(--bg-tavern) 40%,
        var(--bg-stone) 100%);
      color: var(--text-warm);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ============================================================
       HUD — Frame estilo Warcraft 3 (madeira + ouro bordado)
       ============================================================ */
    .hud-frame {
      position: fixed;
      background: linear-gradient(180deg, var(--wood) 0%, var(--bg-warm) 100%);
      border: 2px solid var(--gold);
      border-radius: 8px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5) inset,
        0 0 18px rgba(212,175,55,0.25),
        0 4px 14px rgba(0,0,0,0.6);
      padding: 10px 14px;
      z-index: 10;
    }
    .hud-frame::before {
      content: "";
      position: absolute;
      inset: 3px;
      border: 1px solid var(--bronze);
      border-radius: 5px;
      pointer-events: none;
    }

    /* Top-left: Brand */
    #hud-brand {
      top: 16px;
      left: 16px;
      min-width: 320px;
    }
    #hud-brand .title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--gold-bright);
      letter-spacing: 3px;
      text-shadow:
        0 0 8px rgba(212,175,55,0.5),
        0 2px 0 rgba(0,0,0,0.7);
      margin: 0;
    }
    #hud-brand .subtitle {
      font-family: 'MedievalSharp', cursive;
      font-size: 12px;
      color: var(--parchment);
      margin: 2px 0 0;
      letter-spacing: 1px;
    }
    #hud-brand .meta {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Top-right: Connection status */
    #hud-conn {
      top: 16px;
      right: 16px;
      font-family: 'MedievalSharp', cursive;
      font-size: 13px;
    }
    #hud-conn .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 8px currentColor;
    }
    #hud-conn .dot.connected   { background: var(--druid-green); color: var(--druid-green); }
    #hud-conn .dot.connecting  { background: var(--gold); color: var(--gold); animation: pulseDot 1.2s infinite; }
    #hud-conn .dot.disconnected{ background: var(--blood); color: var(--blood); }
    @keyframes pulseDot {
      50% { opacity: 0.4; }
    }

    /* Bottom-center: Status banner */
    #hud-status {
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      min-width: 480px;
      padding: 14px 28px;
    }
    #hud-status .heading {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold-bright);
      letter-spacing: 4px;
      margin: 0;
      text-shadow: 0 0 8px rgba(212,175,55,0.4);
    }
    #hud-status .body {
      font-family: 'MedievalSharp', cursive;
      font-size: 14px;
      color: var(--parchment);
      margin: 6px 0 0;
    }
    #hud-status .counter {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--text-faded);
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* Top-center: Stat bars WC3-style (mana / hp / gold) */
    #hud-stats {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      padding: 8px 16px;
    }
    .stat-bar {
      min-width: 150px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-bar .icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      border: 1.5px solid var(--gold);
      box-shadow: 0 0 6px currentColor inset;
    }
    .stat-bar.mana .icon  { background: rgba(37,99,235,0.25);  color: var(--mage-blue); }
    .stat-bar.hp   .icon  { background: rgba(22,163,74,0.25);  color: var(--druid-green); }
    .stat-bar.gold .icon  { background: rgba(212,175,55,0.25); color: var(--gold-bright); }
    .stat-bar .meta {
      flex: 1;
      min-width: 0;
    }
    .stat-bar .label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--text-faded);
      text-transform: uppercase;
      margin: 0 0 2px;
    }
    .stat-bar .track {
      height: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      border: 1px solid rgba(212,175,55,0.4);
      overflow: hidden;
      position: relative;
    }
    .stat-bar .fill {
      height: 100%;
      width: 0%;
      transition: width 0.4s ease-out;
      background: linear-gradient(90deg, var(--bronze), var(--gold-bright));
      box-shadow: 0 0 6px currentColor;
    }
    .stat-bar.mana .fill { background: linear-gradient(90deg, #1e40af, #60A5FA); color: var(--mage-blue); }
    .stat-bar.hp   .fill { background: linear-gradient(90deg, #14532d, #4ADE80); color: var(--druid-green); }
    .stat-bar.gold .fill { background: linear-gradient(90deg, #A16207, #FCD34D); color: var(--gold-bright); }
    .stat-bar .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-warm);
      margin-top: 1px;
    }

    /* Right-side: Event log */
    #hud-log {
      top: 90px;
      right: 16px;
      width: 380px;
      max-height: 60vh;
      overflow-y: auto;
      font-family: 'Inter', monospace;
      font-size: 11px;
    }
    #hud-log .log-title {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold-bright);
      letter-spacing: 3px;
      margin: 0 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--bronze);
    }
    #hud-log .entry {
      margin: 4px 0;
      padding: 4px 6px;
      background: rgba(0,0,0,0.25);
      border-left: 2px solid var(--gold);
      border-radius: 3px;
    }
    #hud-log .entry .type {
      font-family: 'MedievalSharp', cursive;
      color: var(--gold-bright);
      font-size: 11px;
    }
    #hud-log .entry .agent {
      color: var(--mage-blue);
      font-weight: 600;
    }
    #hud-log .entry .ts {
      color: var(--text-dim);
      font-size: 9px;
      float: right;
    }
    #hud-log::-webkit-scrollbar { width: 6px; }
    #hud-log::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    #hud-log::-webkit-scrollbar-thumb { background: var(--bronze); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Canvas Three.js (preenchido pelo app.js) -->
<div id="scene"></div>

<!-- HUD: Brand top-left -->
<div id="hud-brand" class="hud-frame">
  <p class="title">DOMA · GUILD HALL</p>
  <p class="subtitle">~ Hall of the Data Agents ~</p>
  <p class="meta">v2 · Warcraft theme · Online</p>
</div>

<!-- HUD: Connection top-right -->
<div id="hud-conn" class="hud-frame">
  <span id="conn-dot" class="dot connecting"></span>
  <span id="conn-text">Conjurando portal...</span>
</div>

<!-- HUD: Stat bars top-center (estilo Warcraft 3) -->
<div id="hud-stats" class="hud-frame">
  <div class="stat-bar mana">
    <div class="icon">💧</div>
    <div class="meta">
      <p class="label">Mana · custo</p>
      <div class="track"><div id="fill-mana" class="fill"></div></div>
      <p class="value" id="stat-mana">$0.000</p>
    </div>
  </div>
  <div class="stat-bar hp">
    <div class="icon">⚔</div>
    <div class="meta">
      <p class="label">HP · turns</p>
      <div class="track"><div id="fill-hp" class="fill"></div></div>
      <p class="value" id="stat-hp">0</p>
    </div>
  </div>
  <div class="stat-bar gold">
    <div class="icon">⭐</div>
    <div class="meta">
      <p class="label">XP · eventos</p>
      <div class="track"><div id="fill-gold" class="fill"></div></div>
      <p class="value" id="stat-gold">0</p>
    </div>
  </div>
</div>

<!-- HUD: Event log right-side -->
<div id="hud-log" class="hud-frame">
  <p class="log-title">📜 Pergaminho de Eventos</p>
  <div id="log-entries"></div>
</div>

<!-- HUD: Status bottom — minimalista (só contador discreto) -->
<div id="hud-status" class="hud-frame">
  <p class="heading">DOMA Guild Hall</p>
  <p class="counter"><span id="event-count">0</span> eventos canalizados · raid em andamento</p>
</div>

<!-- Three.js + nosso shell -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/warcraft/app.js"></script>

</body>
</html>
