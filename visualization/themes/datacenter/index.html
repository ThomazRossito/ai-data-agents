<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOMA · Datacenter NOC</title>

  <!-- ============================================================
       Datacenter theme — cyberpunk server room.
       Agentes são servidores humanóides rackados.
       Supervisor é o NOC (Network Operations Center).
       Backend reutilizado do tema Minecraft.
       ============================================================ -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep:       #04060d;
      --bg-rack:       #0a0e1a;
      --bg-panel:      #0e1424;
      --bg-elev:       #142036;
      --neon-cyan:     #00E5FF;
      --neon-green:    #00FF88;
      --neon-amber:    #FFB300;
      --neon-magenta:  #FF1493;
      --neon-red:      #FF3060;
      --led-active:    #00FF88;
      --led-idle:      #4ade80;
      --text-bright:   #E0F2FE;
      --text-dim:      #94A3B8;
      --text-muted:    #475569;
      --border-glow:   rgba(0,229,255,0.4);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-bright);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    /* HUD — estilo terminal cyberpunk */
    .hud-frame {
      position: fixed;
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-elev) 100%);
      border: 1px solid var(--border-glow);
      border-radius: 4px;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.4),
        0 0 12px rgba(0,229,255,0.12),
        0 2px 8px rgba(0,0,0,0.65);
      padding: 7px 10px;
      z-index: 10;
      backdrop-filter: blur(2px);
    }
    .hud-frame::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      animation: scanline 4s linear infinite;
    }
    @keyframes scanline {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Top-left: brand */
    #hud-brand {
      top: 12px; left: 12px;
      min-width: 240px;
    }
    #hud-brand .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 15px;
      font-weight: 900;
      color: var(--neon-cyan);
      letter-spacing: 2.5px;
      text-shadow: 0 0 8px rgba(0,229,255,0.45);
      margin: 0;
    }
    #hud-brand .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      margin: 2px 0 0;
      letter-spacing: 0.8px;
    }
    #hud-brand .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 1px;
    }
    #hud-brand .meta .blink {
      color: var(--neon-green);
      animation: blink 1.4s infinite;
    }
    @keyframes blink {
      0%, 60% { opacity: 1; }
      60.5%, 100% { opacity: 0.3; }
    }

    /* Top-center: 3 telemetry gauges */
    #hud-stats {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 6px 12px;
    }
    .stat-bar {
      min-width: 124px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .stat-bar .icon {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      flex-shrink: 0;
      border: 1px solid currentColor;
      background: rgba(0,0,0,0.5);
    }
    .stat-bar.cost  .icon { color: var(--neon-magenta); }
    .stat-bar.turns .icon { color: var(--neon-green); }
    .stat-bar.evts  .icon { color: var(--neon-cyan); }
    .stat-bar .meta { flex: 1; min-width: 0; }
    .stat-bar .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin: 0 0 1px;
    }
    .stat-bar .track {
      height: 4px;
      background: rgba(0,0,0,0.6);
      border-radius: 2px;
      border: 1px solid rgba(0,229,255,0.2);
      overflow: hidden;
      position: relative;
    }
    .stat-bar .fill {
      height: 100%;
      width: 0%;
      transition: width 0.4s ease-out;
      box-shadow: 0 0 4px currentColor;
    }
    .stat-bar.cost  .fill { background: var(--neon-magenta); color: var(--neon-magenta); }
    .stat-bar.turns .fill { background: var(--neon-green); color: var(--neon-green); }
    .stat-bar.evts  .fill { background: var(--neon-cyan); color: var(--neon-cyan); }
    .stat-bar .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-bright);
      margin-top: 1px;
    }

    /* Top-right: connection */
    #hud-conn {
      top: 12px; right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }
    #hud-conn .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px currentColor;
    }
    #hud-conn .dot.connected   { background: var(--neon-green); color: var(--neon-green); }
    #hud-conn .dot.connecting  { background: var(--neon-amber); color: var(--neon-amber); animation: pulseDot 1.2s infinite; }
    #hud-conn .dot.disconnected{ background: var(--neon-red); color: var(--neon-red); }
    @keyframes pulseDot { 50% { opacity: 0.4; } }

    /* Right-side: Event stream (terminal log) */
    #hud-log {
      top: 70px; right: 12px;
      width: 280px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }
    #hud-log .log-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      color: var(--neon-cyan);
      letter-spacing: 2.5px;
      margin: 0 0 5px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border-glow);
      text-transform: uppercase;
    }
    #hud-log .entry {
      margin: 2px 0;
      padding: 2px 5px;
      background: rgba(0,0,0,0.4);
      border-left: 2px solid var(--neon-cyan);
      border-radius: 2px;
      font-size: 9px;
    }
    #hud-log .entry .type {
      color: var(--neon-amber);
      font-size: 9px;
      font-weight: 700;
    }
    #hud-log .entry .agent {
      color: var(--neon-green);
    }
    #hud-log .entry .ts {
      color: var(--text-muted);
      font-size: 8px;
      float: right;
    }
    #hud-log .entry .tool {
      color: var(--text-dim);
      font-size: 8px;
    }
    #hud-log::-webkit-scrollbar { width: 4px; }
    #hud-log::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    #hud-log::-webkit-scrollbar-thumb { background: var(--border-glow); }

    /* Bottom-center: NOC status */
    #hud-status {
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      min-width: 320px;
      padding: 6px 14px;
    }
    #hud-status .heading {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      color: var(--neon-cyan);
      letter-spacing: 3px;
      margin: 0;
      text-transform: uppercase;
    }
    #hud-status .body {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      margin: 2px 0 0;
    }
    #hud-status .body .live {
      color: var(--neon-green);
      animation: blink 1.4s infinite;
    }
  </style>
</head>
<body>

<div id="scene"></div>

<!-- HUD: Brand top-left -->
<div id="hud-brand" class="hud-frame">
  <p class="title">DOMA · NOC</p>
  <p class="subtitle">Network Operations Center · Data Agents v3</p>
  <p class="meta">
    <span class="blink">●</span> SYSTEMS NOMINAL · 14 NODES ACTIVE
  </p>
</div>

<!-- HUD: Telemetry top-center -->
<div id="hud-stats" class="hud-frame">
  <div class="stat-bar cost">
    <div class="icon">$</div>
    <div class="meta">
      <p class="label">Cost · USD</p>
      <div class="track"><div id="fill-mana" class="fill"></div></div>
      <p class="value" id="stat-mana">$0.000</p>
    </div>
  </div>
  <div class="stat-bar turns">
    <div class="icon">↻</div>
    <div class="meta">
      <p class="label">Turns</p>
      <div class="track"><div id="fill-hp" class="fill"></div></div>
      <p class="value" id="stat-hp">0</p>
    </div>
  </div>
  <div class="stat-bar evts">
    <div class="icon">⚡</div>
    <div class="meta">
      <p class="label">Events</p>
      <div class="track"><div id="fill-gold" class="fill"></div></div>
      <p class="value" id="stat-gold">0</p>
    </div>
  </div>
</div>

<!-- HUD: Connection top-right -->
<div id="hud-conn" class="hud-frame">
  <span id="conn-dot" class="dot connecting"></span>
  <span id="conn-text">Establishing link...</span>
</div>

<!-- HUD: Event log -->
<div id="hud-log" class="hud-frame">
  <p class="log-title">▌ Event Stream</p>
  <div id="log-entries"></div>
</div>

<!-- HUD: NOC status bottom -->
<div id="hud-status" class="hud-frame">
  <p class="heading">DOMA · DATACENTER NOC</p>
  <p class="body"><span id="event-count">0</span> events processed · <span class="live">LIVE</span></p>
</div>

<!-- Session_end fullscreen overlay (escondido por padrão) -->
<div id="deploy-overlay" style="
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, rgba(0,229,255,0.18), rgba(4,6,13,0.92) 70%);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.6s ease-in-out;
  pointer-events: none;
">
  <div style="
    border: 2px solid var(--neon-cyan);
    background: rgba(14, 20, 36, 0.92);
    padding: 32px 64px;
    box-shadow: 0 0 60px rgba(0, 229, 255, 0.6);
    text-align: center;
  ">
    <p id="deploy-icon" style="
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: var(--neon-green);
      letter-spacing: 8px;
      margin: 0;
      text-shadow: 0 0 24px rgba(0, 255, 136, 0.6);
    ">▌ DEPLOY COMPLETE</p>
    <p id="deploy-subtitle" style="
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text-dim);
      margin: 12px 0 0;
      letter-spacing: 2px;
    ">all nodes synchronized · session terminated</p>
    <p id="deploy-stats" style="
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: var(--neon-cyan);
      margin: 18px 0 0;
      letter-spacing: 1px;
    "></p>
  </div>
</div>

<!-- Three.js + OrbitControls -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
<script src="/datacenter/app.js"></script>

</body>
</html>
