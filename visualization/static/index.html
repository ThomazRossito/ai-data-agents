<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ai-data-agents · escritório dos agentes</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #1a1d2e 0%, #0e1018 100%);
      color: #dde2f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #scene {
      position: absolute;
      inset: 0;
      cursor: grab;
    }
    #scene.dragging { cursor: grabbing; }

    /* HUD topo */
    .hud-top {
      position: absolute;
      top: 14px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      font-size: 13px;
      letter-spacing: 0.3px;
      z-index: 10;
    }
    .hud-title {
      color: #f4c875;
      font-weight: 500;
    }
    .hud-sep {
      opacity: 0.4;
      margin: 0 8px;
    }
    .hud-phase {
      opacity: 0.85;
    }
    .hud-badges {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .badge {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      transition: opacity 0.4s, transform 0.4s;
      opacity: 0.3;
    }
    .hud-metrics {
      font-size: 11px;
      opacity: 0.85;
      display: flex;
      gap: 16px;
    }
    .hud-metrics .ico { display: inline-block; margin-right: 4px; }

    /* Dispatcher toast */
    .dispatch-toast {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      font-size: 12px;
      color: #dde2f0;
      background: rgba(93,202,165,0.16);
      border: 0.5px solid rgba(93,202,165,0.6);
      padding: 7px 16px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
      z-index: 10;
      max-width: 60vw;
      text-align: center;
    }
    .dispatch-toast.visible { opacity: 1; }

    /* HUD bottom */
    .hud-bottom {
      position: absolute;
      bottom: 14px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      font-size: 11px;
      z-index: 10;
    }
    .task-log {
      max-width: 65%;
      color: rgba(220,220,235,0.85);
      line-height: 1.5;
    }
    .task-log .agent {
      color: #f4c875;
      font-weight: 500;
    }
    .task-log .tool {
      color: #a78bfa;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
    }
    .task-log .sep {
      opacity: 0.5;
      margin: 0 6px;
    }
    .controls-hint {
      opacity: 0.4;
      color: rgba(220,220,235,0.7);
    }

    /* Connection status — vive embarcado no canto inferior direito */
    .conn-status {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      margin-right: 14px;
      opacity: 0.85;
    }
    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .conn-dot.connected { background: #5dcaa5; box-shadow: 0 0 6px rgba(93,202,165,0.6); }
    .conn-dot.connecting { background: #f4c875; }
    .conn-dot.disconnected { background: #e24b4a; }

    /* Loading overlay (some quando bootstrap completa) */
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(11,14,20,0.92);
      z-index: 100;
      transition: opacity 0.4s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(244,200,117,0.2);
      border-top-color: #f4c875;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; opacity: 0.8; }
  </style>
</head>
<body>
  <div id="scene"></div>

  <!-- Loading overlay -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">carregando agentes...</div>
  </div>

  <!-- HUD topo esquerda: título + fase atual -->
  <div class="hud-top">
    <div>
      <span class="hud-title">ai-data-agents</span>
      <span class="hud-sep">·</span>
      <span class="hud-phase" id="phase-label">aguardando primeira query</span>
    </div>
    <div class="hud-badges" id="badge-row"></div>
    <div class="hud-metrics">
      <span><span class="ico">🟢</span><span id="active-count">0/14</span></span>
      <span><span class="ico">💰</span>$<span id="cost">0.0000</span></span>
      <span><span class="ico">🔄</span><span id="turn-count">0</span></span>
    </div>
  </div>

  <!-- Dispatcher toast -->
  <div class="dispatch-toast" id="dispatch-toast">
    🎯 <span id="dispatch-msg">dispatcher pensando...</span>
  </div>

  <!-- HUD bottom: log + hint -->
  <div class="hud-bottom">
    <div class="task-log" id="task-log">
      <span style="opacity:0.5;">aguardando eventos do supervisor...</span>
    </div>
    <div class="controls-hint">
      <span class="conn-status">
        <span class="conn-dot connecting" id="conn-dot"></span>
        <span id="conn-label">conectando...</span>
      </span>
      arraste · scroll
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
